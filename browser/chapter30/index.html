<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Indexes Exist</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Indexes Exist</h1>
<p>Full table scan vs hash index lookup for random queries. Index costs 1 read every time; scan grows with table size.</p>
<div class="controls" id="controls"></div>
<div id="status">Running queries — watch reads accumulate.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Full scan (no index)', 'Hash index (O(1))', 320, 180);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'scan reads/query', color:'#ef5350'},{label:'index reads/query', color:'#43a047'}], 60);

var tableSize = 20;
var tickN=0, lastTs=0;
var scanTotal=0, idxTotal=0, queries=0;

function reset() {
  tickN=0; scanTotal=0; idxTotal=0; queries=0;
  strip.reset();
  met.update({queries:0,'scan avg-reads':0,'idx avg-reads':1,tableSize:tableSize});
  document.getElementById('status').textContent = 'Running random queries.';
}

function buildTable(n) {
  var rows=[];
  for(var i=0;i<n;i++) rows.push(i*2);
  return rows;
}

function drawTable(ctx,cv,rows,hiIdx,label,reads) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width,n=rows.length,cw=Math.max(14,Math.floor((W-10)/n)),ch=30,sy=35;
  var maxShow=Math.floor((W-10)/14);
  var shown=rows.slice(0,maxShow);
  shown.forEach(function(v,i){
    var isCur=i===hiIdx;
    ctx.fillStyle=isCur?'#fff176':'#e3f2fd';
    ctx.fillRect(5+i*cw,sy,cw-1,ch);
    ctx.strokeStyle=isCur?'#f57f17':'#ddd'; ctx.lineWidth=isCur?2:1;
    ctx.strokeRect(5+i*cw,sy,cw-1,ch); ctx.lineWidth=1;
    ctx.fillStyle='#333'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(v,5+i*cw+cw/2-0.5,sy+ch/2+3);
  });
  ctx.fillStyle='#555'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label+' | reads: '+reads, W/2, sy+ch+18);
}

function frame(ts) {
  if(ts-lastTs<400){state.rafId=requestAnimationFrame(frame);return;}
  lastTs=ts; tickN++; queries++;

  var rows=buildTable(tableSize);
  var target=rows[Math.floor(Math.random()*rows.length)];
  // scan: avg tableSize/2 reads
  var scanReads=Math.floor(Math.random()*tableSize)+1;
  var idxReads=1;
  var scanHi=rows.indexOf(target);

  scanTotal+=scanReads; idxTotal+=idxReads;
  var scanAvg=(scanTotal/queries).toFixed(1);
  var idxAvg=(idxTotal/queries).toFixed(1);

  strip.push(0,scanReads);
  strip.push(1,idxReads);
  drawTable(ctxA,cvA,rows,scanHi,'Full scan',scanReads);
  drawTable(ctxB,cvB,rows,-1,'Hash index',idxReads);
  met.update({queries:queries,'scan avg-reads':scanAvg,'idx avg-reads':idxAvg,tableSize:tableSize});
  document.getElementById('status').textContent=
    'Query #'+queries+': scan='+scanReads+' reads, index='+idxReads+' read. Cumulative avg scan: '+scanAvg;

  if(!state.paused) state.rafId=requestAnimationFrame(frame);
}

SimLib.slider('Table size', 5, 50, 5, 20, function(v){ tableSize=v; reset(); });
var state=SimLib.pauseResumeReset(frame,reset);
var met=SimLib.metrics();
reset();
state.rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
