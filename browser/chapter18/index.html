<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Functions Exist</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Functions Exist</h1>
<p>Without functions, the same steps are repeated inline. With functions, one definition is called N times.</p>
<div class="controls" id="controls"></div>
<div id="status">Press Run to animate.</div>
<div id="ab-container"></div>
<script src="../common/sim.js"></script>
<script>
const container = document.getElementById('ab-container');
const [ctxA, ctxB, cvA, cvB] = SimLib.sideBySide(container, 'Without Functions (copy-paste)', 'With Functions (reuse)', 320, 240);

let callCount = 3;
let step = 0;
let rafId = null, lastTick = 0;
const STEPS_PER_CALL = 3; // lines per "call"

function drawWithout(highlightCall, highlightStep) {
  const ctx = ctxA, cv = cvA;
  ctx.clearRect(0, 0, cv.width, cv.height);
  const lineH = 18, startY = 24, startX = 10;
  ctx.font = '11px monospace'; ctx.textAlign = 'left';

  for (let c = 0; c < callCount; c++) {
    ctx.fillStyle = c === highlightCall ? '#fff176' : '#f9f9f9';
    ctx.fillRect(startX, startY + c * (STEPS_PER_CALL * lineH + 8), cv.width - 20, STEPS_PER_CALL * lineH + 4);
    ctx.strokeStyle = c === highlightCall ? '#f57f17' : '#ddd';
    ctx.strokeRect(startX, startY + c * (STEPS_PER_CALL * lineH + 8), cv.width - 20, STEPS_PER_CALL * lineH + 4);

    for (let s = 0; s < STEPS_PER_CALL; s++) {
      const y = startY + c * (STEPS_PER_CALL * lineH + 8) + (s + 1) * lineH;
      const isHi = c === highlightCall && s === highlightStep;
      ctx.fillStyle = isHi ? '#ef5350' : '#555';
      ctx.fillText(['  x = input[' + c + ']', '  y = x * x + 2', '  output[' + c + '] = y'][s], startX + 4, y);
    }
  }
  ctx.fillStyle = '#888'; ctx.font = '10px sans-serif';
  ctx.fillText(callCount + ' copies of same code', startX, cv.height - 8);
  ctx.fillStyle = '#c62828'; ctx.font = 'bold 11px sans-serif';
  ctx.fillText('Lines: ' + (callCount * STEPS_PER_CALL), cv.width - 80, cv.height - 8);
}

function drawWith(highlightCall, highlightStep) {
  const ctx = ctxB, cv = cvB;
  ctx.clearRect(0, 0, cv.width, cv.height);
  const lineH = 18, startX = 10;
  ctx.font = '11px monospace'; ctx.textAlign = 'left';

  // function definition
  ctx.fillStyle = '#e8f5e9';
  ctx.fillRect(startX, 10, cv.width - 20, STEPS_PER_CALL * lineH + 18);
  ctx.strokeStyle = '#66bb6a'; ctx.strokeRect(startX, 10, cv.width - 20, STEPS_PER_CALL * lineH + 18);
  ctx.fillStyle = '#2e7d32'; ctx.font = 'bold 11px monospace';
  ctx.fillText('function compute(x) {', startX + 4, 26);
  const lines = ['  y = x * x + 2', '  return y', '}'];
  lines.forEach(function (l, s) {
    ctx.fillStyle = s === highlightStep ? '#ef5350' : '#555';
    ctx.font = '11px monospace';
    ctx.fillText(l, startX + 4, 26 + (s + 1) * lineH);
  });

  // call sites
  const callY = 10 + STEPS_PER_CALL * lineH + 28;
  ctx.fillStyle = '#555'; ctx.font = '11px monospace';
  for (let c = 0; c < callCount; c++) {
    const y = callY + c * lineH;
    const isHi = c === highlightCall;
    ctx.fillStyle = isHi ? '#fff176' : '#f5f5f5';
    ctx.fillRect(startX, y - lineH + 4, cv.width - 20, lineH);
    ctx.fillStyle = isHi ? '#c62828' : '#555';
    ctx.fillText('output[' + c + '] = compute(input[' + c + '])', startX + 4, y);
  }

  ctx.fillStyle = '#888'; ctx.font = '10px sans-serif';
  ctx.fillText('1 definition, ' + callCount + ' call sites', startX, cv.height - 8);
  ctx.fillStyle = '#388e3c'; ctx.font = 'bold 11px sans-serif';
  ctx.fillText('Lines: ' + (STEPS_PER_CALL + callCount + 2), cv.width - 80, cv.height - 8);
}

function reset() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  step = 0;
  drawWithout(-1, -1);
  drawWith(-1, -1);
  met.update({ calls: callCount, 'w/o lines': callCount * STEPS_PER_CALL, 'w/ lines': STEPS_PER_CALL + callCount + 2 });
  document.getElementById('status').textContent = 'Press Run.';
}

function tick(ts) {
  if (ts - lastTick < 300) { rafId = requestAnimationFrame(tick); return; }
  lastTick = ts;
  const totalSteps = callCount * STEPS_PER_CALL;
  if (step >= totalSteps) {
    drawWithout(-1, -1); drawWith(-1, -1);
    document.getElementById('status').textContent = 'Done. Without: ' + totalSteps + ' lines executed. With: ' + (STEPS_PER_CALL + callCount) + ' lines.';
    rafId = null; return;
  }
  const callIdx = Math.floor(step / STEPS_PER_CALL);
  const stepIdx = step % STEPS_PER_CALL;
  drawWithout(callIdx, stepIdx);
  drawWith(callIdx, stepIdx);
  met.update({ calls: callCount, 'current call': callIdx + 1, 'step': stepIdx + 1, 'w/o executed': step + 1, 'w/ executed': STEPS_PER_CALL * (callIdx > 0 ? 1 : 1) + callIdx + 1 });
  step++;
  rafId = requestAnimationFrame(tick);
}

SimLib.slider('Call count', 2, 6, 1, 3, function (v) { callCount = v; reset(); });
SimLib.makeButton('Run', function () { step = 0; lastTick = 0; if (rafId) cancelAnimationFrame(rafId); rafId = requestAnimationFrame(tick); });
SimLib.makeButton('Reset', reset);

const met = SimLib.metrics();
reset();
</script>
</body>
</html>
