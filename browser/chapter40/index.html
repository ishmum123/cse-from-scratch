<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why One Computer Isn't Enough</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why One Computer Isn't Enough</h1>
<p>Single node: data rate quickly saturates capacity — writes queue, then overflow. Sharded cluster: each shard handles a fraction of the load; the cluster scales horizontally.</p>
<div class="controls" id="controls"></div>
<div id="status">Running — raise data rate to see single node overflow.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Single node', 'Sharded cluster (N shards)', 320, 210);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'single overflow', color:'#ef5350'},{label:'shard max load', color:'#43a047'}], 80);

var dataRate = 8;
var nodeCapacity = 10;
var numShards = 3;
var tickN=0, lastTs=0;
var singleLoad=0, singleOverflow=0, shardLoads;

function reset() {
  tickN=0; singleLoad=0; singleOverflow=0;
  shardLoads=[];
  for(var i=0;i<numShards;i++) shardLoads.push(0);
  strip.reset();
  met.update({tick:0,'single load':0,'single overflow':0,'shard max':0,'shards':numShards});
  document.getElementById('status').textContent = 'Running. Raise data rate to see overflow.';
}

function drawSingle(ctx, cv) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width;
  var overflowing=singleLoad>=nodeCapacity;
  var bw=W-40,bh=30,bx=20,by=50;
  ctx.fillStyle='#eee'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=overflowing?'#ef5350':'#90caf9';
  ctx.fillRect(bx,by,bw*Math.min(1,singleLoad/nodeCapacity),bh);
  ctx.strokeStyle='#bbb'; ctx.strokeRect(bx,by,bw,bh);
  ctx.strokeStyle='#f44336'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bx+bw,by-4); ctx.lineTo(bx+bw,by+bh+4); ctx.stroke(); ctx.lineWidth=1;
  ctx.fillStyle='#f44336'; ctx.font='9px sans-serif'; ctx.textAlign='right';
  ctx.fillText('cap='+nodeCapacity, bx+bw-2, by-6);
  ctx.fillStyle=overflowing?'#ffcdd2':'#c8e6c9';
  ctx.fillRect(W/2-40,10,80,28); ctx.strokeStyle='#bbb'; ctx.strokeRect(W/2-40,10,80,28);
  ctx.fillStyle='#333'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Node', W/2, 24);
  ctx.font='10px sans-serif'; ctx.fillText(overflowing?'OVERFLOW!':'OK', W/2, 36);
  ctx.fillStyle='#333'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('load: '+singleLoad.toFixed(1)+' / cap: '+nodeCapacity, W/2, by+bh+18);
  ctx.fillText('dropped: '+singleOverflow, W/2, by+bh+34);
  ctx.fillStyle='#555'; ctx.font='10px sans-serif';
  ctx.fillText('data rate='+dataRate, W/2, cv.height-6);
}

function drawShards(ctx, cv) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width;
  ctx.fillStyle='#e3f2fd'; ctx.fillRect(W/2-40,8,80,24);
  ctx.strokeStyle='#90a4ae'; ctx.strokeRect(W/2-40,8,80,24);
  ctx.fillStyle='#333'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Coordinator', W/2, 24);
  shardLoads.forEach(function(load,i){
    var n=shardLoads.length;
    var x=W*(i+1)/(n+1);
    ctx.strokeStyle='#90a4ae'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(W/2,32); ctx.lineTo(x,70); ctx.stroke();
    var over=load>nodeCapacity;
    ctx.fillStyle=over?'#ffcdd2':'#c8e6c9';
    ctx.fillRect(x-30,70,60,30); ctx.strokeStyle='#bbb'; ctx.strokeRect(x-30,70,60,30);
    ctx.fillStyle='#333'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('S'+(i+1),x,84);
    ctx.font='9px sans-serif';
    ctx.fillText(load.toFixed(1)+'/'+nodeCapacity,x,96);
    var bh=6, bw2=50;
    ctx.fillStyle='#eee'; ctx.fillRect(x-25,104,bw2,bh);
    ctx.fillStyle=over?'#ef5350':'#43a047';
    ctx.fillRect(x-25,104,bw2*Math.min(1,load/nodeCapacity),bh);
    ctx.strokeStyle='#ccc'; ctx.strokeRect(x-25,104,bw2,bh);
  });
  var maxLoad=Math.max.apply(null,shardLoads);
  ctx.fillStyle='#555'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('max shard: '+maxLoad.toFixed(1)+'/'+nodeCapacity+' ('+numShards+' shards)', W/2, cv.height-6);
}

function frame(ts) {
  if(ts-lastTs<350){state.rafId=requestAnimationFrame(frame);return;}
  lastTs=ts; tickN++;

  var incoming=dataRate*(0.8+Math.random()*0.4);

  if (incoming>nodeCapacity) {
    singleOverflow+=Math.round(incoming-nodeCapacity);
    singleLoad=nodeCapacity;
  } else {
    singleLoad=incoming;
  }

  var perShard=incoming/numShards;
  for(var i=0;i<numShards;i++) shardLoads[i]=perShard;

  var maxShard=Math.max.apply(null,shardLoads);
  strip.push(0,singleOverflow);
  strip.push(1,maxShard);
  drawSingle(ctxA,cvA);
  drawShards(ctxB,cvB);
  met.update({tick:tickN,'single load':singleLoad.toFixed(1),'dropped':singleOverflow,
    'shard max':maxShard.toFixed(1),'shards':numShards,'data rate':dataRate});
  document.getElementById('status').textContent=
    'Single: load='+singleLoad.toFixed(1)+'/'+nodeCapacity+' dropped='+singleOverflow+
    ' | Shards: each='+perShard.toFixed(1)+'/'+nodeCapacity;

  if(!state.paused) state.rafId=requestAnimationFrame(frame);
}

SimLib.slider('Data rate', 2, 20, 1, 8, function(v){ dataRate=v; });
SimLib.slider('Node capacity', 5, 20, 1, 10, function(v){ nodeCapacity=v; });
SimLib.slider('Num shards', 2, 6, 1, 3, function(v){ numShards=v; reset(); });
var state=SimLib.pauseResumeReset(frame,reset);
var met=SimLib.metrics();
reset();
state.rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
