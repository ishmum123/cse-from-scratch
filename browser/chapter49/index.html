<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Sharding Exists</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Sharding Exists</h1>
<p>Hot single shard: all writes funnel to one shard — throughput collapses. Consistent hashing: keys distribute evenly across shards — load spreads.</p>
<div class="controls" id="controls"></div>
<div id="status">Comparing hot shard vs consistent hashing throughput.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Hot shard (naive)', 'Consistent hashing', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'hot shard tput', color:'#ef5350'},{label:'hashing tput', color:'#43a047'}], 80);

var numShards = 4;
var requestsPerTick = 20;
var tickN = 0, lastTs = 0;
var hotTotal = 0, hashTotal = 0;
var hotLoads = [], hashLoads = [];

function reset() {
  tickN = 0; hotTotal = 0; hashTotal = 0;
  hotLoads = new Array(numShards).fill(0);
  hashLoads = new Array(numShards).fill(0);
  strip.reset();
  met.update({ tick: 0, 'hot tput': 0, 'hash tput': 0 });
  document.getElementById('status').textContent = 'Running.';
}

function drawShards(ctx, cv, loads, label) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width, n = loads.length;
  var bw = Math.floor((W - 20) / n) - 4;
  var maxLoad = Math.max.apply(null, loads.concat([requestsPerTick]));
  var maxH = 100;
  for (var i = 0; i < n; i++) {
    var x = 10 + i * (bw + 4);
    var h = Math.round((loads[i] / maxLoad) * maxH);
    var hot = loads[i] > requestsPerTick * 0.6;
    ctx.fillStyle = hot ? '#ffcdd2' : '#c8e6c9';
    ctx.fillRect(x, 140 - h, bw, h);
    ctx.strokeStyle = '#bbb'; ctx.strokeRect(x, 140 - h, bw, h);
    ctx.fillStyle = '#333'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('S' + (i + 1), x + bw / 2, 155);
    ctx.fillText(loads[i], x + bw / 2, 138 - h - 2);
  }
  var total = loads.reduce(function(a, b) { return a + b; }, 0);
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(label + ' | total: ' + total, W / 2, 175);
}

function frame(ts) {
  if (ts - lastTs < 400) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  // Hot shard: all requests go to shard 0 (e.g. all keys hash to same shard)
  hotLoads = new Array(numShards).fill(0);
  hotLoads[0] = requestsPerTick;
  var hotTput = Math.round(requestsPerTick / numShards); // queuing reduces effective throughput
  hotTotal += hotTput;

  // Consistent hashing: requests spread evenly
  hashLoads = new Array(numShards).fill(0);
  for (var i = 0; i < requestsPerTick; i++) {
    hashLoads[i % numShards]++;
  }
  var hashTput = requestsPerTick;
  hashTotal += hashTput;

  strip.push(0, hotTput);
  strip.push(1, hashTput);
  drawShards(ctxA, cvA, hotLoads, 'Hot shard');
  drawShards(ctxB, cvB, hashLoads, 'Consistent hash');
  met.update({ tick: tickN, 'hot tput': hotTput, 'hash tput': hashTput });
  document.getElementById('status').textContent =
    'Hot throughput: ' + hotTput + '/tick | Hash throughput: ' + hashTput + '/tick';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Shards', 2, 8, 2, 4, function(v) { numShards = v; reset(); });
SimLib.slider('Requests/tick', 5, 40, 5, 20, function(v) { requestsPerTick = v; });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
