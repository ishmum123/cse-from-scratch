<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why GPUs Changed Everything</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why GPUs Changed Everything</h1>
<p>CPU serial processing: tokens processed one at a time — throughput limited. GPU parallel attention: all token pairs computed simultaneously — throughput multiplied.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch serial vs parallel token processing.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'CPU serial', 'GPU parallel', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'cpu tput', color:'#ef5350'},{label:'gpu tput', color:'#43a047'}], 80);

var seqLen = 8;
var tickN = 0, lastTs = 0;
var serialStep = 0;

function reset() {
  tickN = 0; serialStep = 0;
  strip.reset();
  met.update({ 'seq len': seqLen, 'cpu tput': 1, 'gpu tput': seqLen });
  document.getElementById('status').textContent = 'Running.';
}

function drawSerial(ctx, cv, n, step) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var r = 14, spacing = (W - 20) / n;
  for (var i = 0; i < n; i++) {
    var x = 10 + i * spacing + spacing / 2;
    ctx.beginPath(); ctx.arc(x, 60, r, 0, 2 * Math.PI);
    ctx.fillStyle = i < step ? '#c8e6c9' : (i === step ? '#fff9c4' : '#f5f5f5');
    ctx.fill(); ctx.strokeStyle = i === step ? '#f9a825' : '#ccc'; ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('T' + (i + 1), x, 63);
  }
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Processing token ' + (step + 1) + '/' + n, W / 2, 100);
  ctx.fillText('tput: 1 token/step', W / 2, 118);
}

function drawParallel(ctx, cv, n) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var r = 14, spacing = (W - 20) / n;
  // All tokens processed in parallel
  for (var i = 0; i < n; i++) {
    var xi = 10 + i * spacing + spacing / 2;
    for (var j = 0; j < n; j++) {
      var xj = 10 + j * spacing + spacing / 2;
      if (i !== j) {
        ctx.strokeStyle = 'rgba(33,150,243,0.2)';
        ctx.beginPath(); ctx.moveTo(xi, 60); ctx.lineTo(xj, 60); ctx.stroke();
      }
    }
  }
  for (var k = 0; k < n; k++) {
    var xk = 10 + k * spacing + spacing / 2;
    ctx.beginPath(); ctx.arc(xk, 60, r, 0, 2 * Math.PI);
    ctx.fillStyle = '#c8e6c9'; ctx.fill(); ctx.strokeStyle = '#388e3c'; ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('T' + (k + 1), xk, 63);
  }
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('All ' + n + ' tokens in parallel', W / 2, 100);
  ctx.fillText('tput: ' + n + ' tokens/step', W / 2, 118);
}

function frame(ts) {
  if (ts - lastTs < 400) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;
  serialStep = tickN % seqLen;

  strip.push(0, 1);
  strip.push(1, seqLen);
  drawSerial(ctxA, cvA, seqLen, serialStep);
  drawParallel(ctxB, cvB, seqLen);
  met.update({ 'seq len': seqLen, 'cpu tput': 1, 'gpu tput': seqLen, speedup: seqLen + 'x' });
  document.getElementById('status').textContent =
    'Seq len=' + seqLen + ' | CPU: 1 tok/step | GPU: ' + seqLen + ' tok/step (' + seqLen + 'x speedup)';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Seq length', 4, 16, 2, 8, function(v) { seqLen = v; reset(); });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
