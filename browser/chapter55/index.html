<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Transformers Scale</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Transformers Scale</h1>
<p>Sequential RNN: each token must wait for the previous — total time grows linearly with sequence length. Parallel transformer layer: all tokens processed in one step — time stays constant regardless of sequence length.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch processing time vs sequence length.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'RNN (sequential)', 'Transformer (parallel)', 320, 210);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'rnn time', color:'#ef5350'},{label:'transformer time', color:'#43a047'}], 80);

var seqLen = 8;
var tokenCost = 5; // ms per token (schematic)
var tickN = 0, lastTs = 0;
var rnnStep = 0; // which token is currently being processed

function reset() {
  tickN = 0; rnnStep = 0;
  strip.reset();
  met.update({ 'seq len': seqLen, 'rnn time': seqLen * tokenCost + 'ms', 'xfmr time': tokenCost + 'ms' });
  document.getElementById('status').textContent = 'Running.';
}

function drawRNN(ctx, cv, n, step) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var r = 13, spacing = (W - 20) / n;

  // Hidden state arrow thread
  for (var i = 0; i < n - 1; i++) {
    var x1 = 10 + i * spacing + spacing / 2;
    var x2 = 10 + (i + 1) * spacing + spacing / 2;
    ctx.strokeStyle = i < step ? '#ef9a9a' : '#e0e0e0';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x1 + r, 55); ctx.lineTo(x2 - r, 55); ctx.stroke();
    // arrowhead
    ctx.beginPath(); ctx.moveTo(x2 - r, 55);
    ctx.lineTo(x2 - r - 5, 50); ctx.lineTo(x2 - r - 5, 60); ctx.closePath();
    ctx.fillStyle = i < step ? '#ef9a9a' : '#e0e0e0'; ctx.fill();
    ctx.lineWidth = 1;
  }

  for (var j = 0; j < n; j++) {
    var x = 10 + j * spacing + spacing / 2;
    ctx.beginPath(); ctx.arc(x, 55, r, 0, 2 * Math.PI);
    ctx.fillStyle = j < step ? '#c8e6c9' : (j === step ? '#fff9c4' : '#f5f5f5');
    ctx.fill(); ctx.strokeStyle = j === step ? '#f9a825' : '#bbb'; ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('T' + (j + 1), x, 58);
  }

  var rnnTime = n * tokenCost;
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Processing token ' + (step + 1) + '/' + n, W / 2, 90);
  ctx.fillText('Each token waits for prior hidden state', W / 2, 108);
  ctx.fillStyle = '#e53935'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText('Total time: ' + rnnTime + 'ms (O(N))', W / 2, 126);
}

function drawTransformer(ctx, cv, n) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var r = 13, spacing = (W - 20) / n;

  // All tokens computed in one parallel step — draw attention connections
  for (var i = 0; i < n; i++) {
    var xi = 10 + i * spacing + spacing / 2;
    for (var j = i + 1; j < n; j++) {
      var xj = 10 + j * spacing + spacing / 2;
      ctx.strokeStyle = 'rgba(67,160,71,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(xi, 55); ctx.lineTo(xj, 55); ctx.stroke();
    }
  }

  for (var k = 0; k < n; k++) {
    var xk = 10 + k * spacing + spacing / 2;
    ctx.beginPath(); ctx.arc(xk, 55, r, 0, 2 * Math.PI);
    ctx.fillStyle = '#c8e6c9'; ctx.fill(); ctx.strokeStyle = '#388e3c'; ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('T' + (k + 1), xk, 58);
  }

  // Single parallel layer bar
  ctx.fillStyle = '#e8f5e9';
  ctx.fillRect(20, 82, W - 40, 16);
  ctx.strokeStyle = '#388e3c'; ctx.strokeRect(20, 82, W - 40, 16);
  ctx.fillStyle = '#2e7d32'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Layer: all ' + n + ' tokens in ONE parallel pass', W / 2, 94);

  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('No sequential dependency between tokens', W / 2, 112);
  ctx.fillStyle = '#2e7d32'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText('Total time: ' + tokenCost + 'ms (O(1))', W / 2, 130);
}

function frame(ts) {
  if (ts - lastTs < 400) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;
  rnnStep = tickN % seqLen;

  var rnnTime = seqLen * tokenCost;
  var xfmrTime = tokenCost;

  strip.push(0, rnnTime);
  strip.push(1, xfmrTime);
  drawRNN(ctxA, cvA, seqLen, rnnStep);
  drawTransformer(ctxB, cvB, seqLen);
  met.update({ 'seq len': seqLen, 'rnn time': rnnTime + 'ms', 'xfmr time': xfmrTime + 'ms', speedup: (rnnTime / xfmrTime) + 'x' });
  document.getElementById('status').textContent =
    'Seq=' + seqLen + ' | RNN: ' + rnnTime + 'ms | Transformer: ' + xfmrTime + 'ms (' + (rnnTime / xfmrTime) + 'x faster)';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Seq length', 2, 20, 2, 8, function(v) { seqLen = v; reset(); });
SimLib.slider('Token cost (ms)', 1, 20, 1, 5, function(v) { tokenCost = v; reset(); });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
