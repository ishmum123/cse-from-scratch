<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Eventual Consistency Exists</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Eventual Consistency Exists</h1>
<p>Replication lag: reads may return stale data from a lagging replica. Read-your-writes: route reads to primary or use version tokens — stale reads drop to zero.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch stale reads accumulate without read-your-writes.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Replica lag (stale reads)', 'Read-your-writes guarantee', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'stale reads', color:'#ef5350'},{label:'ryw stale reads', color:'#43a047'}], 80);

var lagTicks = 3;
var tickN = 0, lastTs = 0;
var staleReads = 0, rywStale = 0;
var primaryVal = 0;
var replicaHistory = [];

function reset() {
  tickN = 0; staleReads = 0; rywStale = 0; primaryVal = 0; replicaHistory = [];
  strip.reset();
  met.update({ tick: 0, 'stale reads': 0, 'ryw stale': 0, 'lag ticks': lagTicks });
  document.getElementById('status').textContent = 'Running.';
}

function drawState(ctx, cv, primaryV, replicaV, stale, label) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  // Primary box
  ctx.fillStyle = '#c8e6c9'; ctx.fillRect(20, 30, 120, 55);
  ctx.strokeStyle = '#bbb'; ctx.strokeRect(20, 30, 120, 55);
  ctx.fillStyle = '#333'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Primary', 80, 48); ctx.font = '13px monospace'; ctx.fillText('v=' + primaryV, 80, 70);
  // Replica box
  var lag = primaryV - replicaV;
  ctx.fillStyle = lag > 0 ? '#ffcdd2' : '#c8e6c9'; ctx.fillRect(180, 30, 120, 55);
  ctx.strokeStyle = '#bbb'; ctx.strokeRect(180, 30, 120, 55);
  ctx.fillStyle = '#333'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Replica', 240, 48); ctx.font = '13px monospace'; ctx.fillText('v=' + replicaV, 240, 70);
  if (lag > 0) { ctx.fillStyle = '#c62828'; ctx.font = '9px sans-serif'; ctx.fillText('lag:' + lag, 240, 82); }
  // Arrow
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(140, 58); ctx.lineTo(180, 58); ctx.stroke();
  ctx.fillStyle = '#888'; ctx.beginPath(); ctx.moveTo(175, 54); ctx.lineTo(180, 58); ctx.lineTo(175, 62); ctx.fill();
  ctx.lineWidth = 1;
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('stale reads: ' + stale, W / 2, 120);
  ctx.fillText(label, W / 2, 140);
}

function frame(ts) {
  if (ts - lastTs < 500) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  // Write to primary each tick
  primaryVal++;
  replicaHistory.push(primaryVal);

  // Replica lags by lagTicks
  var replicaVal = replicaHistory.length > lagTicks ? replicaHistory[replicaHistory.length - 1 - lagTicks] : 0;

  // Naive: read from replica — stale if lag > 0
  if (replicaVal < primaryVal) staleReads++;
  // RYW: read from primary or check version — never stale
  // (rywStale stays 0)

  strip.push(0, staleReads);
  strip.push(1, rywStale);
  drawState(ctxA, cvA, primaryVal, replicaVal, staleReads, 'Reads replica directly');
  drawState(ctxB, cvB, primaryVal, primaryVal, rywStale, 'Reads primary (RYW)');
  met.update({ tick: tickN, 'stale reads': staleReads, 'ryw stale': 0, 'lag ticks': lagTicks });
  document.getElementById('status').textContent =
    'Tick ' + tickN + ' | Replica lag: ' + (primaryVal - replicaVal) + ' | Stale reads: ' + staleReads;

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Lag ticks', 1, 8, 1, 3, function(v) { lagTicks = v; });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
