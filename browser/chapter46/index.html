<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Caches Exist</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Caches Exist</h1>
<p>No cache: every request hits the slow backend. Cache (LRU): hot keys served from memory — latency drops, backend load falls.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch latency difference as cache warms up.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'No cache (always DB)', 'LRU Cache', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'no-cache latency', color:'#ef5350'},{label:'cache latency', color:'#43a047'}], 80);

var cacheSize = 5;
var keySpace = 10;
var dbLatency = 100;
var tickN = 0, lastTs = 0;
var cacheHits = 0, cacheMisses = 0;
var cacheKeys = []; // LRU list

function reset() {
  tickN = 0; cacheHits = 0; cacheMisses = 0; cacheKeys = [];
  strip.reset();
  met.update({ tick: 0, hits: 0, misses: 0, 'hit rate': '0%' });
  document.getElementById('status').textContent = 'Running.';
}

function drawPanel(ctx, cv, key, isHit, avgLatency, requests, label) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  ctx.fillStyle = isHit ? '#c8e6c9' : '#ffcdd2';
  ctx.fillRect(W / 2 - 55, 35, 110, 50);
  ctx.strokeStyle = '#bbb'; ctx.strokeRect(W / 2 - 55, 35, 110, 50);
  ctx.fillStyle = '#333'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(label, W / 2, 55);
  ctx.fillText((isHit ? 'HIT' : 'MISS') + ' key=' + key, W / 2, 75);
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif';
  ctx.fillText('avg latency: ' + avgLatency.toFixed(0) + 'ms', W / 2, 110);
  ctx.fillText('requests: ' + requests, W / 2, 128);
}

function frame(ts) {
  if (ts - lastTs < 350) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  // Zipf-like: key 0 and 1 are most popular
  var rand = Math.random();
  var key = rand < 0.5 ? Math.floor(rand * 4) : Math.floor(Math.random() * keySpace);

  // No-cache: always db latency
  var noCacheLatency = dbLatency;

  // Cache (LRU)
  var idx = cacheKeys.indexOf(key);
  var isHit = idx >= 0;
  var cacheLatency;
  if (isHit) {
    cacheHits++;
    cacheLatency = 5; // cache hit is fast
    // move to front
    cacheKeys.splice(idx, 1); cacheKeys.unshift(key);
  } else {
    cacheMisses++;
    cacheLatency = dbLatency; // miss: fetch from DB
    cacheKeys.unshift(key);
    if (cacheKeys.length > cacheSize) cacheKeys.pop();
  }

  var total = cacheHits + cacheMisses;
  var hitRate = total > 0 ? Math.round(cacheHits / total * 100) : 0;
  var avgCacheLat = (cacheHits * 5 + cacheMisses * dbLatency) / Math.max(1, total);

  strip.push(0, noCacheLatency);
  strip.push(1, cacheLatency);
  drawPanel(ctxA, cvA, key, false, noCacheLatency, tickN, 'No cache');
  drawPanel(ctxB, cvB, key, isHit, avgCacheLat, tickN, 'LRU cache');
  met.update({ tick: tickN, hits: cacheHits, misses: cacheMisses, 'hit rate': hitRate + '%' });
  document.getElementById('status').textContent =
    'Hit rate: ' + hitRate + '% | Cache latency: ' + cacheLatency + 'ms vs DB: ' + dbLatency + 'ms';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Cache size', 1, 10, 1, 5, function(v) { cacheSize = v; reset(); });
SimLib.slider('Key space', 5, 20, 5, 10, function(v) { keySpace = v; reset(); });
SimLib.slider('DB latency ms', 20, 200, 20, 100, function(v) { dbLatency = v; });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
