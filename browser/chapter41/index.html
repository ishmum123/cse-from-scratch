<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Clocks Lie</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Clocks Lie</h1>
<p>Wall-clock timestamps: each node has clock drift, so timestamps disagree on event order. Logical clocks (Lamport): increment on send/receive — order is always consistent.</p>
<div class="controls" id="controls"></div>
<div id="status">Running — watch timestamp disagreements accumulate.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Wall-clock (drifting)', 'Logical clock (Lamport)', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'clock skew', color:'#ef5350'},{label:'logical order errors', color:'#43a047'}], 80);

var driftFactor = 0.2;
var numNodes = 3;
var tickN = 0, lastTs = 0;
var wallClocks, logicalClocks, skewAccum, logicalErrors;

function reset() {
  tickN = 0; skewAccum = 0; logicalErrors = 0;
  wallClocks = [];
  logicalClocks = [];
  for (var i = 0; i < numNodes; i++) {
    wallClocks.push({ t: 0, drift: 1 + (i - 1) * driftFactor });
    logicalClocks.push(0);
  }
  strip.reset();
  met.update({ tick: 0, 'max skew': '0.0', 'logical errors': 0 });
  document.getElementById('status').textContent = 'Running.';
}

function drawClocks(ctx, cv, clocks, isLogical) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width, H = cv.height;
  var n = clocks.length;
  var bw = 80, bh = 50, gap = (W - n * bw) / (n + 1);
  var times = clocks.map(function(c) { return isLogical ? c : c.t; });
  var sorted = times.slice().sort(function(a, b) { return a - b; });
  for (var i = 0; i < n; i++) {
    var x = gap + i * (bw + gap);
    var y = 50;
    var t = times[i];
    var isMin = t === sorted[0];
    var isMax = t === sorted[sorted.length - 1];
    ctx.fillStyle = (!isLogical && isMax && sorted[sorted.length-1] - sorted[0] > 0.5) ? '#ffcdd2' : '#c8e6c9';
    ctx.fillRect(x, y, bw, bh);
    ctx.strokeStyle = '#bbb'; ctx.strokeRect(x, y, bw, bh);
    ctx.fillStyle = '#333'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('N' + (i + 1), x + bw / 2, y + 18);
    ctx.font = '12px monospace';
    ctx.fillText(isLogical ? t : t.toFixed(1), x + bw / 2, y + 36);
  }
  var skew = isLogical ? 0 : (Math.max.apply(null, times) - Math.min.apply(null, times));
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(isLogical ? 'causally ordered' : ('skew: ' + skew.toFixed(2) + 's'), W / 2, 130);
  // message arrow
  var sender = tickN % n;
  var receiver = (tickN + 1) % n;
  var sx = gap + sender * (bw + gap) + bw / 2;
  var rx = gap + receiver * (bw + gap) + bw / 2;
  ctx.strokeStyle = '#1565c0'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(sx, 108); ctx.lineTo(rx, 145); ctx.stroke();
  ctx.fillStyle = '#1565c0'; ctx.font = '10px sans-serif';
  ctx.fillText('msg', (sx + rx) / 2 - 10, 128);
  ctx.lineWidth = 1;
}

function frame(ts) {
  if (ts - lastTs < 400) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  // Wall clocks: each ticks at its own drift rate
  for (var i = 0; i < numNodes; i++) {
    wallClocks[i].t += wallClocks[i].drift * 0.5;
  }
  var wtimes = wallClocks.map(function(c) { return c.t; });
  var wSkew = Math.max.apply(null, wtimes) - Math.min.apply(null, wtimes);
  skewAccum = Math.max(skewAccum, wSkew);

  // Logical clocks: sender increments, receiver takes max+1
  var sender = tickN % numNodes;
  var receiver = (tickN + 1) % numNodes;
  logicalClocks[sender]++;
  var msgTs = logicalClocks[sender];
  logicalClocks[receiver] = Math.max(logicalClocks[receiver], msgTs) + 1;

  strip.push(0, wSkew);
  strip.push(1, 0); // logical always 0 errors
  drawClocks(ctxA, cvA, wallClocks, false);
  drawClocks(ctxB, cvB, logicalClocks, true);
  met.update({ tick: tickN, 'max skew': wSkew.toFixed(2) + 's', 'logical errors': 0 });
  document.getElementById('status').textContent =
    'Wall skew: ' + wSkew.toFixed(2) + 's | Logical: always causally consistent';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Drift factor', 0.05, 0.5, 0.05, 0.2, function(v) {
  driftFactor = v;
  for (var i = 0; i < numNodes; i++) wallClocks[i].drift = 1 + (i - 1) * v;
});
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
