<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Congestion Happens</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Congestion Happens</h1>
<p>No backoff: sender ignores drops and floods the link, causing persistent congestion. Congestion control (AIMD): backs off on loss, probes carefully — lower drops, higher throughput.</p>
<div class="controls" id="controls"></div>
<div id="status">Running — watch drop rates diverge.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'No backoff (flood)', 'AIMD congestion control', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'flood drops', color:'#ef5350'},{label:'AIMD drops', color:'#43a047'}], 80);

var capacity = 10;
var tickN=0, lastTs=0;
var floodWin=capacity+4, aimdWin=1;
var floodDrops=0, aimdDrops=0, floodTotal=0, aimdTotal=0;

function reset() {
  tickN=0; floodWin=capacity+4; aimdWin=1;
  floodDrops=0; aimdDrops=0; floodTotal=0; aimdTotal=0;
  strip.reset();
  met.update({tick:0,'flood window':floodWin,'AIMD window':aimdWin,'flood drops':0,'AIMD drops':0});
  document.getElementById('status').textContent = 'Running.';
}

function dropRate(win,cap) { return Math.max(0,(win-cap)/win); }

function drawWindow(ctx, cv, win, cap, drops, total, label, color) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width;
  // window bar
  var bw=W-40,bh=28,bx=20,by=35;
  var frac=Math.min(1,win/cap);
  ctx.fillStyle='#eee'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=win>cap?'#ef9a9a':color;
  ctx.fillRect(bx,by,bw*Math.min(1,win/cap),bh);
  // capacity line
  ctx.strokeStyle='#f44336'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bx+bw,by); ctx.lineTo(bx+bw,by+bh); ctx.stroke();
  ctx.lineWidth=1;
  ctx.fillStyle='#f44336'; ctx.font='9px sans-serif'; ctx.textAlign='right';
  ctx.fillText('cap='+cap, bx+bw-2, by-3);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#333'; ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label+' window='+win, W/2, by-8);
  var dr=total>0?(drops/total*100).toFixed(1):0;
  ctx.fillText('drops: '+drops+' ('+dr+'%)', W/2, by+bh+18);
  ctx.fillStyle='#555'; ctx.font='10px sans-serif';
  ctx.fillText('total sent: '+total, W/2, cv.height-6);
}

function frame(ts) {
  if(ts-lastTs<350){state.rafId=requestAnimationFrame(frame);return;}
  lastTs=ts; tickN++;

  // Flood: always sends at floodWin (ignores drops)
  var fd=floodWin>capacity?Math.floor((floodWin-capacity)*0.8):0;
  floodDrops+=fd; floodTotal+=floodWin;

  // AIMD: additive increase, multiplicative decrease
  if (aimdWin>capacity) {
    aimdDrops++; aimdTotal+=aimdWin;
    aimdWin=Math.max(1,Math.floor(aimdWin/2));
  } else {
    aimdTotal+=aimdWin;
    aimdWin=Math.min(capacity*2, aimdWin+1);
  }

  strip.push(0,fd);
  strip.push(1,aimdWin>capacity?1:0);
  drawWindow(ctxA,cvA,floodWin,capacity,floodDrops,floodTotal,'Flood','#ef9a9a');
  drawWindow(ctxB,cvB,aimdWin,capacity,aimdDrops,aimdTotal,'AIMD','#a5d6a7');
  var fdr=floodTotal>0?(floodDrops/floodTotal*100).toFixed(1):0;
  var adr=aimdTotal>0?(aimdDrops/aimdTotal*100).toFixed(1):0;
  met.update({tick:tickN,'flood window':floodWin,'AIMD window':aimdWin,
    'flood drops':floodDrops,'AIMD drops':aimdDrops,'flood drop%':fdr,'AIMD drop%':adr});
  document.getElementById('status').textContent=
    'Flood: win='+floodWin+' drop%='+fdr+'% | AIMD: win='+aimdWin+' drop%='+adr+'%';

  if(!state.paused) state.rafId=requestAnimationFrame(frame);
}

SimLib.slider('Link capacity', 4, 20, 2, 10, function(v){ capacity=v; });
SimLib.slider('Flood window', 5, 25, 1, 14, function(v){ floodWin=v; });
var state=SimLib.pauseResumeReset(frame,reset);
var met=SimLib.metrics();
reset();
state.rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
