<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Threads Exist</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Threads Exist</h1>
<p>Single-threaded: tasks run one after another. Multi-threaded: tasks overlap. Same total work; threads finish sooner by parallelising I/O waits.</p>
<div class="controls" id="controls"></div>
<div id="status">Running — watch completion time.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Single-threaded', 'Multi-threaded', 320, 180);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'single progress', color:'#ef5350'},{label:'multi progress', color:'#43a047'}], 60);

var numTasks = 4;
var ioFrac = 0.5; // fraction of each task that is I/O (waitable in parallel)
var tickN = 0;
var lastTs = 0;

function makeTasks(n) {
  var tasks = [];
  for (var i=0; i<n; i++) {
    var total = 8+Math.floor(Math.random()*6);
    tasks.push({id:i+1, total:total, done:0,
      color:['#ef9a9a','#90caf9','#a5d6a7','#ffe082','#ce93d8','#80cbc4'][i%6]});
  }
  return tasks;
}

var singleTasks, multiTasks, singleDoneAt, multiDoneAt;

function reset() {
  tickN=0; singleDoneAt=null; multiDoneAt=null;
  singleTasks = makeTasks(numTasks);
  multiTasks = singleTasks.map(function(t){
    return {id:t.id,total:t.total,done:0,color:t.color};
  });
  strip.reset();
  met.update({tick:0,'single done':0,'multi done':0,'single finish':'—','multi finish':'—'});
  document.getElementById('status').textContent = 'Running…';
}

function drawTasks(ctx, cv, tasks, curIdx) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width, bw=48, bh=20, gap=4;
  var n=tasks.length, startX=(W-(n*(bw+gap)-gap))/2;
  tasks.forEach(function(t,i){
    var x=startX+i*(bw+gap), y=45;
    var pct=t.total>0?t.done/t.total:1;
    ctx.fillStyle='#eee'; ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle=t.color; ctx.fillRect(x,y,bw*pct,bh);
    ctx.strokeStyle=i===curIdx?'#333':'#ccc';
    ctx.lineWidth=i===curIdx?2:1;
    ctx.strokeRect(x,y,bw,bh); ctx.lineWidth=1;
    ctx.fillStyle='#333'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('T'+t.id, x+bw/2, y-5);
    ctx.fillText(t.done+'/'+t.total, x+bw/2, y+bh+12);
  });
  var done=tasks.filter(function(t){return t.done>=t.total;}).length;
  ctx.fillStyle='#555'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Done: '+done+'/'+tasks.length, W/2, cv.height-6);
}

function frame(ts) {
  if (ts-lastTs<300) { state.rafId=requestAnimationFrame(frame); return; }
  lastTs=ts; tickN++;

  // Single: advance one task at a time (sequential)
  var sCurIdx = -1;
  if (!singleDoneAt) {
    var active = singleTasks.filter(function(t){return t.done<t.total;});
    if (active.length) {
      active[0].done++;
      sCurIdx = singleTasks.indexOf(active[0]);
      if (singleTasks.every(function(t){return t.done>=t.total;})) singleDoneAt=tickN;
    }
  }

  // Multi: advance ALL undone tasks in parallel (I/O overlap)
  if (!multiDoneAt) {
    var mCur = -1;
    multiTasks.forEach(function(t,i){
      if (t.done<t.total) { t.done++; mCur=i; }
    });
    if (multiTasks.every(function(t){return t.done>=t.total;})) multiDoneAt=tickN;
  }

  drawTasks(ctxA, cvA, singleTasks, sCurIdx);
  drawTasks(ctxB, cvB, multiTasks, -1);

  var sd = singleTasks.filter(function(t){return t.done>=t.total;}).length;
  var md = multiTasks.filter(function(t){return t.done>=t.total;}).length;
  strip.push(0, sd);
  strip.push(1, md);
  met.update({tick:tickN,'single done':sd,'multi done':md,
    'single finish': singleDoneAt||'—','multi finish':multiDoneAt||'—'});

  if (singleDoneAt && multiDoneAt) {
    document.getElementById('status').textContent =
      'Multi finished at t='+multiDoneAt+', single at t='+singleDoneAt+
      ' ('+((singleDoneAt/multiDoneAt).toFixed(1))+'× faster).';
    return;
  }
  if (!state.paused) state.rafId=requestAnimationFrame(frame);
}

SimLib.slider('Tasks', 2, 6, 1, 4, function(v){ numTasks=v; reset(); });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
