<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why TCP Exists</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why TCP Exists</h1>
<p>Naive send (UDP-like): lost packets gone forever, receiver gets gaps. TCP: sequence numbers + ACKs trigger retransmit of only what's missing.</p>
<div class="controls" id="controls"></div>
<div id="status">Running — watch delivery completeness under loss.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Naive send (no retransmit)', 'TCP (ACK + retransmit)', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'naive received', color:'#ef5350'},{label:'TCP received', color:'#43a047'}], 80);

var numPackets = 10;
var lossRate = 25;
var tickN=0, lastTs=0;
var naiveRecv, tcpRecv, tcpPending;

function reset() {
  tickN=0;
  naiveRecv=new Array(numPackets).fill(false);
  tcpRecv=new Array(numPackets).fill(false);
  tcpPending=[]; // packets needing retransmit
  for(var i=0;i<numPackets;i++) tcpPending.push(i);
  strip.reset();
  met.update({'naive rcvd':0,'TCP rcvd':numPackets,'loss%':lossRate,retransmits:0});
  document.getElementById('status').textContent = 'Running.';
}

var retransmits=0;

function drawPackets(ctx, cv, received, pending, label) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width,n=numPackets,pw=Math.floor((W-20)/n)-2,ph=34,sy=40,sx=10;
  for(var i=0;i<n;i++){
    var x=sx+i*(pw+2);
    var isPending=pending&&pending.indexOf(i)>=0;
    ctx.fillStyle=received[i]?'#c8e6c9':(isPending?'#fff176':'#ffcdd2');
    ctx.fillRect(x,sy,pw,ph);
    ctx.strokeStyle='#ccc'; ctx.strokeRect(x,sy,pw,ph);
    ctx.fillStyle='#333'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('#'+i,x+pw/2,sy+ph/2+3);
  }
  var got=received.filter(Boolean).length;
  ctx.fillStyle='#555'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label+': '+got+'/'+n+' packets', W/2, sy+ph+18);
  ctx.fillText('loss: '+lossRate+'%', W/2, cv.height-6);
}

function frame(ts) {
  if(ts-lastTs<350){state.rafId=requestAnimationFrame(frame);return;}
  lastTs=ts; tickN++;

  // Naive: send each packet once, left to right
  var naiveIdx = tickN-1;
  if (naiveIdx<numPackets) {
    var naiveLost=Math.random()*100<lossRate;
    if (!naiveLost) naiveRecv[naiveIdx]=true;
    // lost: stays false forever
  }

  // TCP: send pending packets, ACK received, retransmit lost
  var newPending=[];
  var toSend=tcpPending.slice(0,3); // window of 3
  toSend.forEach(function(i){
    var lost=Math.random()*100<lossRate;
    if (!lost) { tcpRecv[i]=true; }
    else { newPending.push(i); retransmits++; }
  });
  // remaining pending not yet attempted
  for(var j=3;j<tcpPending.length;j++) newPending.push(tcpPending[j]);
  // add new unsent packets
  tcpPending=newPending;

  var naiveGot=naiveRecv.filter(Boolean).length;
  var tcpGot=tcpRecv.filter(Boolean).length;
  strip.push(0,naiveGot);
  strip.push(1,tcpGot);
  drawPackets(ctxA,cvA,naiveRecv,null,'Naive');
  drawPackets(ctxB,cvB,tcpRecv,tcpPending,'TCP');
  met.update({'naive rcvd':naiveGot,'TCP rcvd':tcpGot,'loss%':lossRate,retransmits:retransmits});
  document.getElementById('status').textContent=
    'Naive: '+naiveGot+'/'+numPackets+'. TCP: '+tcpGot+'/'+numPackets+' ('+retransmits+' retransmits).';

  if(naiveIdx>=numPackets&&tcpPending.length===0) {
    document.getElementById('status').textContent=
      'Done. Naive delivered '+naiveGot+'/'+numPackets+'. TCP delivered '+tcpGot+'/'+numPackets+'.';
    return;
  }
  if(!state.paused) state.rafId=requestAnimationFrame(frame);
}

SimLib.slider('Packets', 5, 16, 1, 10, function(v){ numPackets=v; reset(); });
SimLib.slider('Loss %', 0, 50, 5, 25, function(v){ lossRate=v; });
var state=SimLib.pauseResumeReset(frame,reset);
var met=SimLib.metrics();
reset();
state.rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
