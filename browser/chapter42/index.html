<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Consensus Exists</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Consensus Exists</h1>
<p>Split-brain: two partitions decide independently and can disagree. Majority quorum: only one partition can reach majority, preventing conflicting decisions.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch split-brain conflicts accumulate.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Split-brain (no quorum)', 'Majority quorum', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'split conflicts', color:'#ef5350'},{label:'quorum conflicts', color:'#43a047'}], 80);

var numNodes = 5;
var failProb = 30;
var round = 0, lastTs = 0;
var splitConflicts = 0, quorumConflicts = 0;
var lastVotes = [], lastSplitDec = null, lastQuorumDec = null;

function reset() {
  round = 0; splitConflicts = 0; quorumConflicts = 0;
  lastVotes = []; lastSplitDec = null; lastQuorumDec = null;
  strip.reset();
  met.update({ round: 0, 'split conflicts': 0, 'quorum conflicts': 0 });
  document.getElementById('status').textContent = 'Running.';
}

function drawDecision(ctx, cv, votes, decA, decB, conflicts, isQuorum) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var n = votes.length;
  var r = 18, spacing = (W - 40) / n;
  for (var i = 0; i < n; i++) {
    var x = 20 + i * spacing + spacing / 2;
    ctx.beginPath();
    ctx.arc(x, 55, r, 0, 2 * Math.PI);
    var v = votes[i];
    ctx.fillStyle = v === null ? '#e0e0e0' : (v ? '#c8e6c9' : '#ffcdd2');
    ctx.fill(); ctx.strokeStyle = '#bbb'; ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(v === null ? '?' : (v ? 'Y' : 'N'), x, 59);
    ctx.font = '9px sans-serif';
    ctx.fillText('N' + (i + 1), x, 87);
    if (!isQuorum && i === Math.floor(n / 2) - 1) {
      ctx.strokeStyle = '#f44336'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x + r + 4, 40); ctx.lineTo(x + r + 4, 75); ctx.stroke();
      ctx.lineWidth = 1;
    }
  }
  ctx.fillStyle = '#333'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  if (isQuorum) {
    ctx.fillText(decA === null ? 'No quorum — no decision' : ('Quorum decision: ' + (decA ? 'YES' : 'NO')), W / 2, 115);
  } else {
    ctx.fillText('Part1: ' + (decA === null ? '?' : (decA ? 'YES' : 'NO')) + '  Part2: ' + (decB === null ? '?' : (decB ? 'YES' : 'NO')), W / 2, 115);
  }
  ctx.fillStyle = conflicts > 0 ? '#c62828' : '#555';
  ctx.fillText('conflicts: ' + conflicts, W / 2, 135);
}

function runRound() {
  round++;
  var votes = [];
  for (var i = 0; i < numNodes; i++) {
    votes.push(Math.random() * 100 < failProb ? null : Math.random() < 0.5);
  }
  lastVotes = votes;

  // Split-brain: two partitions
  var half = Math.floor(numNodes / 2);
  var gA = votes.slice(0, half).filter(function(v) { return v !== null; });
  var gB = votes.slice(half).filter(function(v) { return v !== null; });
  var dA = gA.length > 0 ? gA.filter(Boolean).length > gA.length / 2 : null;
  var dB = gB.length > 0 ? gB.filter(Boolean).length > gB.length / 2 : null;
  if (dA !== null && dB !== null && dA !== dB) splitConflicts++;
  lastSplitDec = dA;

  // Quorum: needs >half of ALL nodes
  var valid = votes.filter(function(v) { return v !== null; });
  var yeas = valid.filter(Boolean).length;
  lastQuorumDec = valid.length > numNodes / 2 ? (yeas > valid.length / 2) : null;

  strip.push(0, splitConflicts);
  strip.push(1, quorumConflicts);
  drawDecision(ctxA, cvA, votes, dA, dB, splitConflicts, false);
  drawDecision(ctxB, cvB, votes, lastQuorumDec, null, quorumConflicts, true);
  met.update({ round: round, 'split conflicts': splitConflicts, 'quorum conflicts': quorumConflicts });
  document.getElementById('status').textContent =
    'Round ' + round + ' | Split conflicts: ' + splitConflicts + ' | Quorum conflicts: ' + quorumConflicts;
}

SimLib.slider('Nodes', 3, 7, 2, 5, function(v) { numNodes = v; reset(); });
SimLib.slider('Fail %', 0, 60, 10, 30, function(v) { failProb = v; });
var state = SimLib.pauseResumeReset(function tick(ts) {
  if (ts - lastTs < 900) { state.rafId = requestAnimationFrame(tick); return; }
  lastTs = ts; runRound();
  if (!state.paused) state.rafId = requestAnimationFrame(tick);
}, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(function tick(ts) {
  if (ts - lastTs < 900) { state.rafId = requestAnimationFrame(tick); return; }
  lastTs = ts; runRound();
  if (!state.paused) state.rafId = requestAnimationFrame(tick);
});
</script>
</body>
</html>
