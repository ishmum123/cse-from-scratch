<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Replication Exists</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Replication Exists</h1>
<p>Single point of failure: one server down means zero availability. Redundancy (replication): multiple nodes — failures degrade but don't stop the service.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch availability under random failures.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Single server (SPOF)', 'Redundant cluster', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'single avail%', color:'#ef5350'},{label:'cluster avail%', color:'#43a047'}], 80);

var numReplicas = 3;
var failProb = 15;
var tickN = 0, lastTs = 0;
var singleUp = 0, clusterUp = 0;

function reset() {
  tickN = 0; singleUp = 0; clusterUp = 0;
  strip.reset();
  met.update({ tick: 0, 'single avail': '100%', 'cluster avail': '100%' });
  document.getElementById('status').textContent = 'Running.';
}

function drawCluster(ctx, cv, nodes, available, ticksUp, total, label) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width, n = nodes.length;
  var spacing = (W - 20) / n;
  for (var i = 0; i < n; i++) {
    var x = 10 + i * spacing + spacing / 2;
    ctx.beginPath(); ctx.arc(x, 65, 20, 0, 2 * Math.PI);
    ctx.fillStyle = nodes[i] ? '#c8e6c9' : '#ffcdd2';
    ctx.fill(); ctx.strokeStyle = '#bbb'; ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(nodes[i] ? 'UP' : 'DN', x, 69);
  }
  var avail = total > 0 ? Math.round(ticksUp / total * 100) : 100;
  ctx.fillStyle = available ? '#2e7d32' : '#c62828';
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(available ? 'AVAILABLE' : 'DOWN', W / 2, 115);
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif';
  ctx.fillText('avail: ' + avail + '%', W / 2, 135);
  ctx.fillText(label, W / 2, 153);
}

function frame(ts) {
  if (ts - lastTs < 450) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  // Single server
  var singleFailed = Math.random() * 100 < failProb;
  var singleAvail = !singleFailed;
  if (singleAvail) singleUp++;

  // Cluster: available if any node up
  var clusterNodes = [];
  for (var i = 0; i < numReplicas; i++) {
    clusterNodes.push(!(Math.random() * 100 < failProb));
  }
  var clusterAvail = clusterNodes.some(function(n) { return n; });
  if (clusterAvail) clusterUp++;

  var singlePct = Math.round(singleUp / tickN * 100);
  var clusterPct = Math.round(clusterUp / tickN * 100);

  strip.push(0, singlePct);
  strip.push(1, clusterPct);
  drawCluster(ctxA, cvA, [singleAvail], singleAvail, singleUp, tickN, 'Single server');
  drawCluster(ctxB, cvB, clusterNodes, clusterAvail, clusterUp, tickN, numReplicas + '-node cluster');
  met.update({ tick: tickN, 'single avail': singlePct + '%', 'cluster avail': clusterPct + '%' });
  document.getElementById('status').textContent =
    'Single: ' + singlePct + '% avail | Cluster: ' + clusterPct + '% avail';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Replicas', 2, 6, 1, 3, function(v) { numReplicas = v; reset(); });
SimLib.slider('Fail prob %', 5, 40, 5, 15, function(v) { failProb = v; });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
