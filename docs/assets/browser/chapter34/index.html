<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Query Planners Matter</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Query Planners Matter</h1>
<p>Naive plan: always full scan. Smart planner: picks index seek when selectivity is high. Watch cost explode on large tables without a planner.</p>
<div class="controls" id="controls"></div>
<div id="status">Run queries and watch cost.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Naive (always scan)', 'Smart planner (chooses)', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'naive cost', color:'#ef5350'},{label:'smart cost', color:'#43a047'}], 60);

var tableSize = 30;
var selectivity = 5; // % of rows match
var tickN=0, lastTs=0;
var naiveTotal=0, smartTotal=0, queries=0;

function reset() {
  tickN=0; naiveTotal=0; smartTotal=0; queries=0;
  strip.reset();
  met.update({queries:0,'naive total':0,'smart total':0,tableSize:tableSize,'selectivity%':selectivity});
  document.getElementById('status').textContent = 'Running random queries.';
}

function planSmartCost(n, sel) {
  // if selectivity < 20%, use index (log2 cost); else full scan
  if (sel<20) return Math.ceil(Math.log2(n+1));
  return n;
}

function drawQueryViz(ctx, cv, tableN, cost, plan, color) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width, barMaxW=W-40, barH=26, bx=20, by=50;
  var frac=Math.min(1,cost/tableN);
  ctx.fillStyle='#eee'; ctx.fillRect(bx,by,barMaxW,barH);
  ctx.fillStyle=color; ctx.fillRect(bx,by,barMaxW*frac,barH);
  ctx.strokeStyle='#bbb'; ctx.strokeRect(bx,by,barMaxW,barH);
  ctx.fillStyle='#333'; ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Plan: '+plan, W/2, by-10);
  ctx.fillText('Cost: '+cost+' rows read', W/2, by+barH+18);
  ctx.font='10px sans-serif'; ctx.fillStyle='#777';
  ctx.fillText('table='+tableN+' rows, sel='+selectivity+'%', W/2, cv.height-6);
}

function frame(ts) {
  if(ts-lastTs<400){state.rafId=requestAnimationFrame(frame);return;}
  lastTs=ts; tickN++; queries++;

  var naiveCost=tableSize;
  var smartCost=planSmartCost(tableSize,selectivity);
  var smartPlan=selectivity<20?'index seek (sel<20%)':'full scan (low sel)';

  naiveTotal+=naiveCost; smartTotal+=smartCost;
  strip.push(0,naiveCost);
  strip.push(1,smartCost);
  drawQueryViz(ctxA,cvA,tableSize,naiveCost,'always full scan','#ef9a9a');
  drawQueryViz(ctxB,cvB,tableSize,smartCost,smartPlan,'#a5d6a7');
  met.update({queries:queries,'naive total':naiveTotal,'smart total':smartTotal,
    tableSize:tableSize,'selectivity%':selectivity});
  document.getElementById('status').textContent =
    'Query #'+queries+': naive='+naiveCost+', smart='+smartCost+' ('+smartPlan+'). Cumulative savings: '+(naiveTotal-smartTotal);

  if(!state.paused) state.rafId=requestAnimationFrame(frame);
}

SimLib.slider('Table size', 10, 100, 10, 30, function(v){ tableSize=v; });
SimLib.slider('Selectivity %', 1, 50, 1, 5, function(v){ selectivity=v; });
var state=SimLib.pauseResumeReset(frame,reset);
var met=SimLib.metrics();
reset();
state.rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
