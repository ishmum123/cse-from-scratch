<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Packets Exist</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Packets Exist</h1>
<p>Circuit (one big message): a lossy link drops the entire transfer. Packets: only the lost chunks are retransmitted; delivered bytes keep accumulating.</p>
<div class="controls" id="controls"></div>
<div id="status">Running — watch delivered bytes under packet loss.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Circuit (whole message)', 'Packets (chunks)', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'circuit delivered', color:'#ef5350'},{label:'packet delivered', color:'#43a047'}], 80);

var lossRate = 20; // % per attempt
var totalBytes = 100;
var pktSize = 10; // bytes per packet
var tickN=0, lastTs=0;
var circuitDelivered=0, packetDelivered=0;
var circuitAttempts=0, pktAttempts=0;

function reset() {
  tickN=0; circuitDelivered=0; packetDelivered=0;
  circuitAttempts=0; pktAttempts=0;
  strip.reset();
  met.update({tick:0,'circuit delivered':0,'packet delivered':0,'loss%':lossRate});
  document.getElementById('status').textContent = 'Running.';
}

function drawProgress(ctx, cv, delivered, total, packets, label, color) {
  ctx.clearRect(0,0,cv.width,cv.height);
  var W=cv.width,bw=W-40,bh=28,bx=20,by=40;
  ctx.fillStyle='#eee'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=color; ctx.fillRect(bx,by,bw*(delivered/total),bh);
  ctx.strokeStyle='#bbb'; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#333'; ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label, W/2, by-8);
  ctx.fillText(delivered+'/'+total+' bytes', W/2, by+bh+16);
  // draw individual packets
  if (packets) {
    var n=Math.ceil(total/pktSize), pw=Math.max(8,Math.floor((bw-4)/n)-2);
    for (var i=0;i<n;i++){
      var iDelivered=(i+1)*pktSize<=delivered;
      ctx.fillStyle=iDelivered?color:'#eee';
      ctx.fillRect(bx+2+i*(pw+2),by+bh+24,pw,12);
      ctx.strokeStyle='#ccc'; ctx.strokeRect(bx+2+i*(pw+2),by+bh+24,pw,12);
    }
  }
  ctx.fillStyle='#555'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('loss: '+lossRate+'%', W/2, cv.height-6);
}

function frame(ts) {
  if(ts-lastTs<300){state.rafId=requestAnimationFrame(frame);return;}
  lastTs=ts; tickN++;

  // Circuit: one attempt per tick — if lost, deliver nothing; if OK, deliver all
  if (circuitDelivered<totalBytes) {
    circuitAttempts++;
    var lost=Math.random()*100<lossRate;
    if (!lost) circuitDelivered=totalBytes;
    // else: must retry entire message next tick
  }

  // Packets: send one packet per tick — if lost, that chunk retransmitted next tick
  if (packetDelivered<totalBytes) {
    pktAttempts++;
    var pLost=Math.random()*100<lossRate;
    if (!pLost) packetDelivered=Math.min(totalBytes,packetDelivered+pktSize);
  }

  strip.push(0,circuitDelivered);
  strip.push(1,packetDelivered);
  drawProgress(ctxA,cvA,circuitDelivered,totalBytes,false,'Circuit',circuitDelivered===totalBytes?'#a5d6a7':'#ef9a9a');
  drawProgress(ctxB,cvB,packetDelivered,totalBytes,true,'Packets','#a5d6a7');
  met.update({tick:tickN,'circuit delivered':circuitDelivered,'packet delivered':packetDelivered,'loss%':lossRate});
  document.getElementById('status').textContent=
    'Circuit: '+circuitDelivered+'/'+totalBytes+' bytes ('+circuitAttempts+' attempts). Packets: '+packetDelivered+'/'+totalBytes+' ('+pktAttempts+' chunks sent).';

  if(!state.paused) state.rafId=requestAnimationFrame(frame);
}

SimLib.slider('Loss %', 0, 50, 5, 20, function(v){ lossRate=v; });
SimLib.slider('Packet size', 5, 25, 5, 10, function(v){ pktSize=v; });
var state=SimLib.pauseResumeReset(frame,reset);
var met=SimLib.metrics();
reset();
state.rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
