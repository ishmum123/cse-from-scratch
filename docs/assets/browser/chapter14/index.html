<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Divide and Conquer Works</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Divide and Conquer Works</h1>
<p>Exhaustive vs divide-and-conquer: find max value. Compare work done at each step.</p>
<div class="controls" id="controls"></div>
<div id="status">Press Run to animate both strategies.</div>
<div id="ab-container"></div>
<script src="../common/sim.js"></script>
<script>
const container = document.getElementById('ab-container');
const [ctxA, ctxB, cvA, cvB] = SimLib.sideBySide(container, 'Exhaustive (scan all)', 'Divide & Conquer', 320, 200);

let size = 12;
let arr = [];
let exStep = -1, exMax = -Infinity, exDone = false;
let dcPhase = [], dcStep = 0, dcMax = -Infinity, dcCmps = 0, dcDone = false;
let exCmps = 0;
let rafId = null, lastTick = 0;

function build() {
  arr = Array.from({ length: size }, function () { return Math.floor(Math.random() * 80 + 10); });
  exStep = -1; exMax = -Infinity; exDone = false; exCmps = 0;
  // Pre-compute D&C steps (tournament bracket)
  dcPhase = buildDCSteps(arr.slice());
  dcStep = 0; dcMax = -Infinity; dcCmps = 0; dcDone = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  drawExhaustive(); drawDC(null, -1);
  document.getElementById('status').textContent = 'Array size: ' + size + '. Press Run.';
  met.update({ size: size, 'ex cmps': 0, 'dc cmps': 0 });
}

function buildDCSteps(a) {
  // Returns tournament bracket steps as pairs [i, j] → winner
  const steps = [];
  let round = a.slice();
  while (round.length > 1) {
    const next = [];
    for (let i = 0; i < round.length; i += 2) {
      if (i + 1 < round.length) {
        steps.push({ a: round[i], b: round[i + 1], winner: Math.max(round[i], round[i + 1]) });
        next.push(Math.max(round[i], round[i + 1]));
      } else {
        next.push(round[i]);
      }
    }
    round = next;
  }
  return steps;
}

function cellW(cv) { return Math.floor((cv.width - 10) / size); }

function drawExhaustive() {
  const ctx = ctxA, cv = cvA;
  ctx.clearRect(0, 0, cv.width, cv.height);
  const cw = cellW(cv), maxV = Math.max.apply(null, arr) || 1, ch = cv.height;
  arr.forEach(function (v, i) {
    const x = 5 + i * cw;
    const barH = Math.floor((v / maxV) * (ch - 50));
    const isCur = i === exStep;
    const isMax = v === exMax && i <= exStep;
    ctx.fillStyle = isCur ? '#ef5350' : (isMax ? '#ffd54f' : (i <= exStep ? '#bbdefb' : '#f5f5f5'));
    ctx.fillRect(x, ch - barH - 30, cw - 2, barH);
    ctx.strokeStyle = '#ccc'; ctx.strokeRect(x, ch - barH - 30, cw - 2, barH);
    ctx.fillStyle = '#555'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(v, x + cw / 2 - 1, ch - 16);
  });
  ctx.fillStyle = '#444'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(exDone ? 'Max: ' + exMax + ' (' + exCmps + ' cmps)' : (exStep >= 0 ? 'Checking [' + exStep + ']…' : '—'), cv.width / 2, ch - 4);
}

function drawDC(step, stepIdx) {
  const ctx = ctxB, cv = cvB;
  ctx.clearRect(0, 0, cv.width, cv.height);
  const cw = cellW(cv), maxV = Math.max.apply(null, arr) || 1, ch = cv.height;
  arr.forEach(function (v, i) {
    const x = 5 + i * cw;
    const barH = Math.floor((v / maxV) * (ch - 50));
    ctx.fillStyle = '#e8f5e9';
    ctx.fillRect(x, ch - barH - 30, cw - 2, barH);
    ctx.strokeStyle = '#ccc'; ctx.strokeRect(x, ch - barH - 30, cw - 2, barH);
    ctx.fillStyle = '#555'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(v, x + cw / 2 - 1, ch - 16);
  });
  if (step) {
    ctx.fillStyle = '#43a047'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Round ' + stepIdx + ': ' + step.a + ' vs ' + step.b + ' → ' + step.winner, cv.width / 2, 18);
  }
  ctx.fillStyle = '#444'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(dcDone ? 'Max: ' + dcMax + ' (' + dcCmps + ' cmps)' : (dcStep > 0 ? 'Step ' + dcStep + '/' + dcPhase.length : '—'), cv.width / 2, ch - 4);
}

function tick(ts) {
  if (ts - lastTick < 350) { rafId = requestAnimationFrame(tick); return; }
  lastTick = ts;
  let any = false;

  if (!exDone) {
    exStep++;
    if (exStep >= size) { exDone = true; }
    else { exCmps++; if (arr[exStep] > exMax) exMax = arr[exStep]; }
    drawExhaustive();
    any = true;
  }

  if (!dcDone && dcStep < dcPhase.length) {
    const s = dcPhase[dcStep];
    dcCmps++;
    dcMax = Math.max(dcMax, s.winner);
    drawDC(s, dcStep + 1);
    dcStep++;
    if (dcStep >= dcPhase.length) dcDone = true;
    any = true;
  }

  met.update({ size: size, 'ex cmps': exCmps, 'dc cmps': dcCmps });

  if (!any || (exDone && dcDone)) {
    document.getElementById('status').textContent = 'Both found max=' + exMax + '. Exhaustive: ' + exCmps + ' cmps. D&C: ' + dcCmps + ' cmps.';
    rafId = null;
  } else {
    rafId = requestAnimationFrame(tick);
  }
}

SimLib.slider('Array size', 4, 20, 2, 12, function (v) { size = v; build(); });
SimLib.makeButton('Run', function () { build(); rafId = requestAnimationFrame(tick); });
SimLib.makeButton('New array', build);

const met = SimLib.metrics();
build();
</script>
</body>
</html>
