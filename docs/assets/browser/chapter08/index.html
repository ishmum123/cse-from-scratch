<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Ordering Helps</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Ordering Helps</h1>
<p>Unsorted: check every element. Sorted: stop as soon as value exceeds target.</p>
<div class="controls" id="controls"></div>
<div id="status">Press Run to compare.</div>
<div id="ab-container"></div>
<script src="../common/sim.js"></script>
<script>
const container = document.getElementById('ab-container');
const [ctxA, ctxB, cvA, cvB] = SimLib.sideBySide(container, 'Unsorted (scan all)', 'Sorted (early exit)', 320, 160);

let size = 10;
let target = 44;
let unsorted = [], sorted = [];
let stepA = -1, stepB = -1;
let foundA = -1, foundB = -1;
let doneA = false, doneB = false;
let rafId = null, lastTick = 0;

function build() {
  unsorted = Array.from({ length: size }, function () { return Math.floor(Math.random() * 80 + 5); });
  unsorted[Math.floor(size / 2)] = target;
  sorted = unsorted.slice().sort(function (a, b) { return a - b; });
  stepA = -1; stepB = -1; foundA = -1; foundB = -1; doneA = false; doneB = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  drawBoth();
  document.getElementById('status').textContent = 'Target: ' + target + '. Press Run.';
  met.update({ 'target': target, 'unsorted checks': 0, 'sorted checks': 0 });
}

function cw(cv) { return Math.min(54, Math.floor((cv.width - 10) / size)); }

function drawPanel(ctx, cv, arr, step, found, done, label) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  const cellW = cw(cv), cellH = 50;
  const startX = Math.floor((cv.width - cellW * size) / 2);
  const cellY = 35;

  ctx.fillStyle = '#555';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Target: ' + target, cv.width / 2, 20);

  arr.forEach(function (v, i) {
    const x = startX + i * cellW;
    const past = i < step;
    const current = i === step;
    const isFound = i === found;
    ctx.fillStyle = isFound ? '#c8e6c9' : (current ? '#fff176' : (past ? '#ffcdd2' : '#f5f5f5'));
    ctx.fillRect(x, cellY, cellW - 2, cellH);
    ctx.strokeStyle = (current || isFound) ? '#f57f17' : '#ccc';
    ctx.lineWidth = (current || isFound) ? 2 : 1;
    ctx.strokeRect(x, cellY, cellW - 2, cellH);
    ctx.lineWidth = 1;
    ctx.fillStyle = '#333';
    ctx.font = 'bold ' + Math.min(14, cellW - 6) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(v, x + cellW / 2 - 1, cellY + 30);
  });

  ctx.fillStyle = done ? '#388e3c' : '#666';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  const checks = step < 0 ? 0 : (done ? (found >= 0 ? found + 1 : (label === 'sorted' ? stepB + 1 : size)) : step + 1);
  ctx.fillText(done ? (found >= 0 ? 'Found at [' + found + '], ' + checks + ' checks' : 'Not found, ' + step + ' checks (early exit)') : (step < 0 ? '—' : 'Checking [' + step + ']…'), cv.width / 2, cellY + cellH + 18);
}

function drawBoth() {
  drawPanel(ctxA, cvA, unsorted, stepA, foundA, doneA, 'unsorted');
  drawPanel(ctxB, cvB, sorted, stepB, foundB, doneB, 'sorted');
}

function tick(ts) {
  if (ts - lastTick < 300) { rafId = requestAnimationFrame(tick); return; }
  lastTick = ts;
  let anyRunning = false;

  if (!doneA) {
    stepA++;
    if (stepA >= size) { doneA = true; foundA = -1; }
    else if (unsorted[stepA] === target) { foundA = stepA; doneA = true; }
    anyRunning = true;
  }
  if (!doneB) {
    stepB++;
    if (stepB >= size || sorted[stepB] > target) { doneB = true; foundB = -1; }
    else if (sorted[stepB] === target) { foundB = stepB; doneB = true; }
    anyRunning = true;
  }

  drawBoth();
  const uChecks = doneA ? (foundA >= 0 ? foundA + 1 : size) : stepA + 1;
  const sChecks = doneB ? (foundB >= 0 ? foundB + 1 : stepB + 1) : stepB + 1;
  met.update({ target: target, 'unsorted checks': uChecks, 'sorted checks': sChecks, 'savings': Math.max(0, uChecks - sChecks) + ' checks' });

  if (anyRunning && !(doneA && doneB)) {
    rafId = requestAnimationFrame(tick);
  } else {
    document.getElementById('status').textContent = 'Sorted saved ' + Math.max(0, uChecks - sChecks) + ' comparison(s).';
    rafId = null;
  }
}

SimLib.slider('Size', 5, 16, 1, 10, function (v) { size = v; build(); });
const tgt = SimLib.numberInput('Target', 1, 99, 44, function (v) { target = v; build(); });
SimLib.makeButton('Run', function () {
  if (rafId) cancelAnimationFrame(rafId);
  stepA = -1; stepB = -1; foundA = -1; foundB = -1; doneA = false; doneB = false;
  lastTick = 0; drawBoth();
  rafId = requestAnimationFrame(tick);
});
SimLib.makeButton('New array', build);

const met = SimLib.metrics();
build();
</script>
</body>
</html>
