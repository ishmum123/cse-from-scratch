<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why KV-Cache Exists</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why KV-Cache Exists</h1>
<p>No KV-cache: every new token recomputes attention over the entire context. KV-cache: past keys/values stored — each new token only attends to cached entries.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch recomputation count grow without KV-cache.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'No KV-cache (recompute)', 'KV-cache (store & reuse)', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'no-cache compute', color:'#ef5350'},{label:'kv-cache compute', color:'#43a047'}], 80);

var contextLen = 8;
var tickN = 0, lastTs = 0;
var noKvRecompute = 0, kvRecompute = 0;

function reset() {
  tickN = 0; noKvRecompute = 0; kvRecompute = 0;
  strip.reset();
  met.update({ tick: 0, 'no-kv ops': 0, 'kv ops': 0 });
  document.getElementById('status').textContent = 'Running.';
}

function drawTokens(ctx, cv, n, step, hasCache) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var r = 14, spacing = (W - 20) / Math.max(n, 1);
  // Draw tokens
  for (var i = 0; i <= step && i < n; i++) {
    var x = 10 + i * spacing + spacing / 2;
    var isCurrent = i === step;
    ctx.beginPath(); ctx.arc(x, 55, r, 0, 2 * Math.PI);
    ctx.fillStyle = isCurrent ? '#fff9c4' : (hasCache ? '#c8e6c9' : '#e3f2fd');
    ctx.fill();
    ctx.strokeStyle = isCurrent ? '#f9a825' : (hasCache ? '#388e3c' : '#1565c0');
    ctx.lineWidth = isCurrent ? 2 : 1; ctx.stroke(); ctx.lineWidth = 1;
    ctx.fillStyle = '#333'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('T' + (i + 1), x, 58);
    if (!hasCache && i < step) {
      // attention arrows back from current
      var cx = 10 + step * spacing + spacing / 2;
      ctx.strokeStyle = 'rgba(239,83,80,0.3)';
      ctx.beginPath(); ctx.moveTo(cx, 55); ctx.lineTo(x, 55); ctx.stroke();
    }
  }
  if (hasCache && step > 0) {
    // KV cache box
    ctx.fillStyle = '#e8f5e9'; ctx.fillRect(W / 2 - 55, 90, 110, 30);
    ctx.strokeStyle = '#388e3c'; ctx.strokeRect(W / 2 - 55, 90, 110, 30);
    ctx.fillStyle = '#2e7d32'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('KV cache: ' + step + ' entries', W / 2, 109);
  }
  var ops = hasCache ? 1 : (step + 1);
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('ops this step: ' + ops, W / 2, 145);
  ctx.fillText(hasCache ? 'only 1 new attention' : 'recomputes all ' + (step + 1), W / 2, 163);
}

function frame(ts) {
  if (ts - lastTs < 450) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;
  var step = tickN % contextLen;

  noKvRecompute += step + 1;
  kvRecompute += 1;

  strip.push(0, step + 1);
  strip.push(1, 1);
  drawTokens(ctxA, cvA, contextLen, step, false);
  drawTokens(ctxB, cvB, contextLen, step, true);
  met.update({ tick: tickN, 'no-kv ops': noKvRecompute, 'kv ops': kvRecompute, savings: (noKvRecompute - kvRecompute) });
  document.getElementById('status').textContent =
    'Step ' + step + ' | No-cache: ' + (step + 1) + ' ops | KV-cache: 1 op | Total saved: ' + (noKvRecompute - kvRecompute);

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Context length', 4, 20, 2, 8, function(v) { contextLen = v; reset(); });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
