<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Search Engines Exist</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Search Engines Exist</h1>
<p>Full-text scan: every query reads every document — docs touched grows linearly. Inverted index: query looks up the posting list for the term — docs touched is constant regardless of corpus size.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch docs touched per query as corpus grows.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Full-text scan', 'Inverted index', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'scan docs touched', color:'#ef5350'},{label:'index docs touched', color:'#43a047'}], 80);

var numDocs = 100;
var matchRate = 5; // % of docs that match the query term
var tickN = 0, lastTs = 0;
var scanTotal = 0, idxTotal = 0, queryCount = 0;

function reset() {
  tickN = 0; scanTotal = 0; idxTotal = 0; queryCount = 0;
  strip.reset();
  met.update({ docs: numDocs, 'scan touched': 0, 'index touched': 0 });
  document.getElementById('status').textContent = 'Running.';
}

function drawScan(ctx, cv, n, highlighted) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var cols = Math.ceil(Math.sqrt(n));
  var rows = Math.ceil(n / cols);
  var bw = Math.floor((W - 20) / cols) - 1;
  var bh = Math.floor(140 / rows) - 1;
  for (var i = 0; i < n; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = 10 + col * (bw + 1);
    var y = 10 + row * (bh + 1);
    ctx.fillStyle = i < highlighted ? '#ffcdd2' : '#e0e0e0';
    ctx.fillRect(x, y, bw, bh);
  }
  ctx.fillStyle = '#333'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Scanned: ' + highlighted + '/' + n + ' docs', W / 2, 162);
  ctx.fillStyle = '#e53935'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText('O(N) per query', W / 2, 178);
}

function drawIndex(ctx, cv, n, matches) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  // Draw posting list
  ctx.fillStyle = '#e3f2fd';
  ctx.fillRect(20, 15, W - 40, 30);
  ctx.strokeStyle = '#90caf9'; ctx.strokeRect(20, 15, W - 40, 30);
  ctx.fillStyle = '#1565c0'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Index: "query" → [' + matches + ' docs]', W / 2, 35);

  // Show only matched docs
  var cols = Math.max(1, Math.min(matches, 10));
  var bw = Math.floor((W - 20) / cols) - 2;
  for (var i = 0; i < Math.min(matches, 10); i++) {
    var x = 10 + i * (bw + 2);
    ctx.fillStyle = '#c8e6c9';
    ctx.fillRect(x, 60, bw, 60);
    ctx.strokeStyle = '#388e3c'; ctx.strokeRect(x, 60, bw, 60);
  }
  if (matches > 10) {
    ctx.fillStyle = '#555'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('+' + (matches - 10) + ' more', W / 2, 135);
  }
  ctx.fillStyle = '#333'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Fetched: ' + matches + ' matching docs', W / 2, 162);
  ctx.fillStyle = '#2e7d32'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText('O(matches) per query — not O(N)', W / 2, 178);
}

function frame(ts) {
  if (ts - lastTs < 500) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;
  queryCount++;

  // Scan touches all docs
  var scanTouched = numDocs;
  // Index touches only matching docs
  var idxTouched = Math.max(1, Math.round(numDocs * matchRate / 100));

  scanTotal += scanTouched;
  idxTotal += idxTouched;

  strip.push(0, scanTouched);
  strip.push(1, idxTouched);
  drawScan(ctxA, cvA, numDocs, scanTouched);
  drawIndex(ctxB, cvB, numDocs, idxTouched);
  met.update({ docs: numDocs, 'scan touched': scanTouched, 'index touched': idxTouched, speedup: Math.round(scanTouched / idxTouched) + 'x' });
  document.getElementById('status').textContent =
    numDocs + ' docs | Scan: ' + scanTouched + ' touched | Index: ' + idxTouched + ' touched (' + Math.round(scanTouched / idxTouched) + 'x faster)';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Num docs', 10, 500, 10, 100, function(v) { numDocs = v; reset(); });
SimLib.slider('Match rate %', 1, 20, 1, 5, function(v) { matchRate = v; reset(); });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
