<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Queues Exist</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Queues Exist</h1>
<p>Synchronous coupling: producer blocks waiting for slow consumer — cascade stalls. Message queue buffering: producer enqueues and continues; consumer drains at its own pace.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch producer stalls without a queue.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Synchronous (no queue)', 'Message queue', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'sync stalls', color:'#ef5350'},{label:'queue depth', color:'#2196F3'}], 80);

var produceRate = 3;
var consumeRate = 2;
var tickN = 0, lastTs = 0;
var syncStalls = 0, syncProduced = 0;
var queueDepth = 0, queueProduced = 0, queueConsumed = 0;

function reset() {
  tickN = 0; syncStalls = 0; syncProduced = 0;
  queueDepth = 0; queueProduced = 0; queueConsumed = 0;
  strip.reset();
  met.update({ tick: 0, 'sync stalls': 0, 'queue depth': 0 });
  document.getElementById('status').textContent = 'Running.';
}

function drawSync(ctx, cv, produced, stalls) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var stalling = stalls > 0 && tickN % 2 === 0;
  // Producer
  ctx.fillStyle = stalling ? '#ffcdd2' : '#c8e6c9';
  ctx.fillRect(20, 50, 80, 50);
  ctx.strokeStyle = '#bbb'; ctx.strokeRect(20, 50, 80, 50);
  ctx.fillStyle = '#333'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Producer', 60, 70);
  ctx.font = '9px sans-serif'; ctx.fillText(stalling ? 'BLOCKED' : 'sending', 60, 87);
  // Arrow
  ctx.strokeStyle = stalling ? '#ef5350' : '#888';
  ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(100, 75); ctx.lineTo(135, 75); ctx.stroke(); ctx.lineWidth = 1;
  ctx.fillStyle = stalling ? '#ef5350' : '#888';
  ctx.beginPath(); ctx.moveTo(130, 71); ctx.lineTo(135, 75); ctx.lineTo(130, 79); ctx.fill();
  // Consumer
  ctx.fillStyle = '#e3f2fd';
  ctx.fillRect(135, 50, 80, 50); ctx.strokeStyle = '#bbb'; ctx.strokeRect(135, 50, 80, 50);
  ctx.fillStyle = '#333'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Consumer', 175, 70); ctx.font = '9px sans-serif'; ctx.fillText('(slow)', 175, 87);
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif';
  ctx.fillText('stalls: ' + stalls + ' | produced: ' + produced, W / 2, 140);
}

function drawQueue(ctx, cv, depth, produced, consumed) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  ctx.fillStyle = '#c8e6c9'; ctx.fillRect(15, 55, 70, 45); ctx.strokeStyle = '#bbb'; ctx.strokeRect(15, 55, 70, 45);
  ctx.fillStyle = '#333'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Producer', 50, 72); ctx.font = '9px sans-serif'; ctx.fillText('free', 50, 88);
  // Queue buffer
  ctx.fillStyle = depth > 8 ? '#fff9c4' : '#e3f2fd';
  ctx.fillRect(95, 45, 55, 65); ctx.strokeStyle = '#bbb'; ctx.strokeRect(95, 45, 55, 65);
  ctx.fillStyle = '#333'; ctx.font = 'bold 9px sans-serif'; ctx.fillText('Queue', 122, 62);
  ctx.font = '12px monospace'; ctx.fillText(depth, 122, 84); ctx.font = '8px sans-serif'; ctx.fillText('msgs', 122, 98);
  // Consumer
  ctx.fillStyle = '#e3f2fd'; ctx.fillRect(160, 55, 70, 45); ctx.strokeStyle = '#bbb'; ctx.strokeRect(160, 55, 70, 45);
  ctx.fillStyle = '#333'; ctx.font = 'bold 9px sans-serif'; ctx.fillText('Consumer', 195, 72);
  ctx.font = '9px sans-serif'; ctx.fillText('draining', 195, 88);
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('produced: ' + produced + ' | consumed: ' + consumed, W / 2, 140);
}

function frame(ts) {
  if (ts - lastTs < 400) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  // Sync: producer tries to send produceRate items; consumer handles consumeRate
  var syncSent = Math.min(produceRate, consumeRate);
  var stall = produceRate > consumeRate;
  if (stall) syncStalls++;
  syncProduced += syncSent;

  // Queue: producer enqueues freely; consumer drains at own pace
  queueDepth += produceRate;
  var consumed = Math.min(queueDepth, consumeRate);
  queueDepth -= consumed;
  queueProduced += produceRate; queueConsumed += consumed;

  strip.push(0, syncStalls);
  strip.push(1, queueDepth);
  drawSync(ctxA, cvA, syncProduced, syncStalls);
  drawQueue(ctxB, cvB, queueDepth, queueProduced, queueConsumed);
  met.update({ tick: tickN, 'sync stalls': syncStalls, 'queue depth': queueDepth });
  document.getElementById('status').textContent =
    'Sync stalls: ' + syncStalls + ' | Queue depth: ' + queueDepth + ' | Consumed: ' + queueConsumed;

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Produce rate', 1, 8, 1, 3, function(v) { produceRate = v; });
SimLib.slider('Consume rate', 1, 8, 1, 2, function(v) { consumeRate = v; });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
