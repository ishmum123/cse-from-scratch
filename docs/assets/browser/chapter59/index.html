<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why MoE Exists</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why MoE Exists</h1>
<p>Dense FFN: every token activates all parameters — FLOPs scale with model size. Mixture-of-Experts: a router picks top-K of E experts per token — active FLOPs stay constant while capacity grows.</p>
<div class="controls" id="controls"></div>
<div id="status">Watch FLOPs per token as expert count changes.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Dense FFN', 'Mixture of Experts (MoE)', 320, 210);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'dense FLOPs', color:'#ef5350'},{label:'MoE FLOPs', color:'#43a047'}], 80);

var numExperts = 8;
var topK = 2; // experts active per token
var expertFlops = 10; // FLOPs per expert (schematic units)
var tickN = 0, lastTs = 0;
var activeExperts = []; // which experts are selected this tick

function reset() {
  tickN = 0; activeExperts = [];
  strip.reset();
  met.update({ experts: numExperts, 'top-k': topK, 'dense FLOPs': numExperts * expertFlops, 'MoE FLOPs': topK * expertFlops });
  document.getElementById('status').textContent = 'Running.';
}

function pickTopK(E, k) {
  // Simulate router: assign random scores, pick top-k indices
  var scores = [];
  for (var i = 0; i < E; i++) scores.push({ idx: i, score: Math.random() });
  scores.sort(function(a, b) { return b.score - a.score; });
  return scores.slice(0, k).map(function(s) { return s.idx; });
}

function drawDense(ctx, cv, E) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var cols = Math.min(E, 4);
  var rows = Math.ceil(E / cols);
  var bw = Math.floor((W - 20) / cols) - 3;
  var bh = 32;

  // Token at top
  ctx.fillStyle = '#fff9c4'; ctx.fillRect(W / 2 - 20, 8, 40, 18);
  ctx.strokeStyle = '#f9a825'; ctx.strokeRect(W / 2 - 20, 8, 40, 18);
  ctx.fillStyle = '#333'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('token', W / 2, 21);

  // Lines from token to all experts
  var baseY = 36;
  for (var i = 0; i < E; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = 10 + col * (bw + 3) + bw / 2;
    var y = baseY + row * (bh + 4);
    ctx.strokeStyle = 'rgba(239,83,80,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W / 2, 26); ctx.lineTo(x, y); ctx.stroke();
  }

  for (var j = 0; j < E; j++) {
    var cj = j % cols;
    var rj = Math.floor(j / cols);
    var xj = 10 + cj * (bw + 3);
    var yj = baseY + rj * (bh + 4);
    ctx.fillStyle = '#ffcdd2';
    ctx.fillRect(xj, yj, bw, bh);
    ctx.strokeStyle = '#e53935'; ctx.strokeRect(xj, yj, bw, bh);
    ctx.fillStyle = '#333'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('E' + j, xj + bw / 2, yj + 14);
    ctx.font = '7px sans-serif'; ctx.fillText('active', xj + bw / 2, yj + 25);
  }

  var denseFlops = E * expertFlops;
  var bottomY = baseY + rows * (bh + 4) + 6;
  ctx.fillStyle = '#e53935'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('FLOPs: ' + denseFlops + ' (' + E + ' experts active)', W / 2, bottomY);
  ctx.fillStyle = '#555'; ctx.font = '9px sans-serif';
  ctx.fillText('scales with model size O(E)', W / 2, bottomY + 14);
}

function drawMoE(ctx, cv, E, k, active) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var cols = Math.min(E, 4);
  var rows = Math.ceil(E / cols);
  var bw = Math.floor((W - 20) / cols) - 3;
  var bh = 32;

  // Router box
  ctx.fillStyle = '#e8f5e9'; ctx.fillRect(W / 2 - 30, 8, 60, 18);
  ctx.strokeStyle = '#388e3c'; ctx.strokeRect(W / 2 - 30, 8, 60, 18);
  ctx.fillStyle = '#333'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Router (top-' + k + ')', W / 2, 21);

  var baseY = 36;
  var activeSet = {};
  active.forEach(function(i) { activeSet[i] = true; });

  // Lines only to active experts
  for (var a = 0; a < active.length; a++) {
    var i = active[a];
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = 10 + col * (bw + 3) + bw / 2;
    var y = baseY + row * (bh + 4);
    ctx.strokeStyle = 'rgba(67,160,71,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(W / 2, 26); ctx.lineTo(x, y); ctx.stroke();
    ctx.lineWidth = 1;
  }

  for (var j = 0; j < E; j++) {
    var cj = j % cols;
    var rj = Math.floor(j / cols);
    var xj = 10 + cj * (bw + 3);
    var yj = baseY + rj * (bh + 4);
    var isActive = !!activeSet[j];
    ctx.fillStyle = isActive ? '#c8e6c9' : '#f5f5f5';
    ctx.fillRect(xj, yj, bw, bh);
    ctx.strokeStyle = isActive ? '#388e3c' : '#e0e0e0';
    ctx.lineWidth = isActive ? 1.5 : 1;
    ctx.strokeRect(xj, yj, bw, bh);
    ctx.lineWidth = 1;
    ctx.fillStyle = isActive ? '#333' : '#aaa'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('E' + j, xj + bw / 2, yj + 14);
    ctx.font = '7px sans-serif'; ctx.fillText(isActive ? 'ACTIVE' : 'idle', xj + bw / 2, yj + 25);
  }

  var moeFlops = k * expertFlops;
  var bottomY = baseY + rows * (bh + 4) + 6;
  ctx.fillStyle = '#2e7d32'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('FLOPs: ' + moeFlops + ' (only ' + k + '/' + E + ' experts active)', W / 2, bottomY);
  ctx.fillStyle = '#555'; ctx.font = '9px sans-serif';
  ctx.fillText('constant O(k) regardless of E', W / 2, bottomY + 14);
}

function frame(ts) {
  if (ts - lastTs < 700) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  activeExperts = pickTopK(numExperts, topK);

  var denseFlops = numExperts * expertFlops;
  var moeFlops = topK * expertFlops;

  strip.push(0, denseFlops);
  strip.push(1, moeFlops);
  drawDense(ctxA, cvA, numExperts);
  drawMoE(ctxB, cvB, numExperts, topK, activeExperts);
  met.update({ experts: numExperts, 'top-k': topK, 'dense FLOPs': denseFlops, 'MoE FLOPs': moeFlops, savings: ((1 - topK / numExperts) * 100).toFixed(0) + '%' });
  document.getElementById('status').textContent =
    numExperts + ' experts, top-' + topK + ' active | Dense: ' + denseFlops + ' FLOPs | MoE: ' + moeFlops + ' FLOPs (' + ((1 - topK / numExperts) * 100).toFixed(0) + '% saved)';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Expert count', 2, 16, 2, 8, function(v) { numExperts = v; topK = Math.min(topK, v); reset(); });
SimLib.slider('Top-k active', 1, 4, 1, 2, function(v) { topK = Math.min(v, numExperts); reset(); });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
