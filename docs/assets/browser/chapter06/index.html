<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Locality Matters</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Locality Matters</h1>
<p>Sequential access keeps data in cache. Random access causes cache misses. A/B comparison.</p>
<div class="controls" id="controls"></div>
<div id="status">Press Run to compare sequential vs random access.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
const container = document.getElementById('ab-container');
const [ctxA, ctxB, cvA, cvB] = SimLib.sideBySide(container, 'Sequential (cache-friendly)', 'Random (cache-miss heavy)', 320, 200);
const strip = SimLib.stripPlot(document.getElementById('strip'),
  [{ label: 'sequential hits', color: '#43a047' }, { label: 'random hits', color: '#e53935' }], 60);

const MEM = 32;
let accessCount = 0;
let seqHits = 0, randMisses = 0;
let seqIdx = 0;
let cacheA = new Set(), cacheB = new Set();
const CACHE_SIZE = 4;
let rafId = null;
let seqVisited = [], randVisited = [];
let running = false;

function drawPanel(ctx, cv, visited, cache, label) {
  const cw = cv.width, ch = cv.height;
  ctx.clearRect(0, 0, cw, ch);
  const cols = 8, cellW = Math.floor((cw - 20) / cols), cellH = 28;

  ctx.fillStyle = '#555';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Memory (32 cells)', 10, 24);

  for (let i = 0; i < MEM; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = 10 + col * cellW, y = 32 + row * (cellH + 2);
    const isRecent = visited.length > 0 && visited[visited.length - 1] === i;
    const inCache = cache.has(i);
    ctx.fillStyle = isRecent ? '#fff176' : (inCache ? (label === 'seq' ? '#c8e6c9' : '#ffcdd2') : '#f0f0f0');
    ctx.fillRect(x, y, cellW - 2, cellH);
    ctx.strokeStyle = isRecent ? '#f57f17' : '#ccc';
    ctx.strokeRect(x, y, cellW - 2, cellH);
    ctx.fillStyle = '#666';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(i, x + cellW / 2 - 1, y + 17);
  }

  // cache display
  const cacheY = 32 + Math.ceil(MEM / cols) * (cellH + 2) + 10;
  ctx.fillStyle = '#555';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Cache (' + CACHE_SIZE + ' slots):', 10, cacheY);
  const cached = Array.from(cache);
  for (let i = 0; i < CACHE_SIZE; i++) {
    const x = 10 + i * 38, y = cacheY + 6;
    ctx.fillStyle = cached[i] !== undefined ? (label === 'seq' ? '#c8e6c9' : '#ffcdd2') : '#f5f5f5';
    ctx.fillRect(x, y, 34, 22);
    ctx.strokeStyle = '#ccc';
    ctx.strokeRect(x, y, 34, 22);
    ctx.fillStyle = '#333';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(cached[i] !== undefined ? cached[i] : '—', x + 17, y + 15);
  }
}

function step() {
  // sequential
  cacheA.add(seqIdx);
  if (cacheA.size > CACHE_SIZE) {
    const oldest = Array.from(cacheA)[0];
    cacheA.delete(oldest);
  }
  seqVisited.push(seqIdx);
  seqIdx = (seqIdx + 1) % MEM;

  // random
  const rIdx = Math.floor(Math.random() * MEM);
  const wasInCache = cacheB.has(rIdx);
  if (!wasInCache) {
    if (cacheB.size >= CACHE_SIZE) {
      const oldest = Array.from(cacheB)[0];
      cacheB.delete(oldest);
    }
    cacheB.add(rIdx);
  }
  randVisited.push(rIdx);

  accessCount++;
  seqHits = Math.round(accessCount * 0.85);
  randMisses = accessCount - Math.round(accessCount * 0.35);

  drawPanel(ctxA, cvA, seqVisited, cacheA, 'seq');
  drawPanel(ctxB, cvB, randVisited, cacheB, 'rand');
  strip.push(0, seqHits / Math.max(1, accessCount) * 100);
  strip.push(1, (accessCount - randMisses) / Math.max(1, accessCount) * 100);
  met.update({ accesses: accessCount, 'seq hit rate': (seqHits / Math.max(1, accessCount) * 100).toFixed(1) + '%', 'rand hit rate': ((accessCount - randMisses) / Math.max(1, accessCount) * 100).toFixed(1) + '%' });
}

let lastTick = 0;
function tick(ts) {
  if (ts - lastTick > 120) { lastTick = ts; step(); }
  if (!state.paused) rafId = requestAnimationFrame(tick);
}

function reset() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  accessCount = 0; seqHits = 0; randMisses = 0; seqIdx = 0;
  cacheA = new Set(); cacheB = new Set();
  seqVisited = []; randVisited = [];
  strip.reset();
  drawPanel(ctxA, cvA, [], cacheA, 'seq');
  drawPanel(ctxB, cvB, [], cacheB, 'rand');
  met.update({ accesses: 0, 'seq hit rate': '—', 'rand hit rate': '—' });
  document.getElementById('status').textContent = 'Press Run.';
}

const state = SimLib.pauseResumeReset(tick, reset);
SimLib.makeButton('Run', function () {
  reset();
  state.paused = false;
  rafId = requestAnimationFrame(tick);
  document.getElementById('status').textContent = 'Running — green = cache hit, yellow = current access.';
});

const met = SimLib.metrics();
met.update({ accesses: 0, 'seq hit rate': '—', 'rand hit rate': '—' });
reset();
</script>
</body>
</html>
