<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Raft Works</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; text-align: center; }
  canvas { border: 1px solid #ccc; display: block; margin: 0.5rem auto; background: #fafafa; }
  .controls { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
  #status { min-height: 1.5rem; color: #444; margin: 0.4rem 0; }
</style>
</head>
<body>
<p><a href="../../index.html">← Back</a></p>
<h1>Why Raft Works</h1>
<p>Leaderless multi-master: any node accepts writes, conflicts accumulate. Raft single-leader: one elected leader routes all writes per term — no conflicts, clear ordering.</p>
<div class="controls" id="controls"></div>
<div id="status">Comparing multi-master conflicts vs Raft single leader.</div>
<div id="ab-container"></div>
<canvas id="strip" width="700" height="80"></canvas>
<script src="../common/sim.js"></script>
<script>
var container = document.getElementById('ab-container');
var refs = SimLib.sideBySide(container, 'Multi-master (leaderless)', 'Raft (single leader)', 320, 200);
var ctxA = refs[0], ctxB = refs[1], cvA = refs[2], cvB = refs[3];
var strip = SimLib.stripPlot(document.getElementById('strip'),
  [{label:'multi-master conflicts', color:'#ef5350'},{label:'raft conflicts', color:'#43a047'}], 80);

var numNodes = 5;
var writeRate = 40;
var tickN = 0, lastTs = 0;
var mlConflicts = 0, raftConflicts = 0;
var raftLeader = 0, raftTerm = 1;

function reset() {
  tickN = 0; mlConflicts = 0; raftConflicts = 0;
  raftLeader = 0; raftTerm = 1;
  strip.reset();
  met.update({ tick: 0, 'ML conflicts': 0, 'raft conflicts': 0, 'raft term': 1 });
  document.getElementById('status').textContent = 'Running.';
}

function drawNodes(ctx, cv, writers, leader, conflicts, term) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width;
  var spacing = (W - 20) / numNodes;
  for (var i = 0; i < numNodes; i++) {
    var x = 10 + i * spacing + spacing / 2;
    var isWriter = writers.indexOf(i) >= 0;
    var isLeader = i === leader;
    ctx.beginPath(); ctx.arc(x, 65, 20, 0, 2 * Math.PI);
    ctx.fillStyle = isLeader ? '#fff9c4' : (isWriter ? '#c8e6c9' : '#e3f2fd');
    ctx.fill();
    ctx.strokeStyle = isLeader ? '#f9a825' : (isWriter ? '#388e3c' : '#bbb');
    ctx.lineWidth = isLeader ? 2.5 : 1; ctx.stroke(); ctx.lineWidth = 1;
    ctx.fillStyle = '#333'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('N' + (i + 1), x, 62);
    if (isWriter) { ctx.fillStyle = '#388e3c'; ctx.font = '9px sans-serif'; ctx.fillText('WRITE', x, 76); }
    if (isLeader) { ctx.fillStyle = '#f9a825'; ctx.font = '9px sans-serif'; ctx.fillText('LEAD', x, 95); }
  }
  ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(term ? ('Term ' + term) : 'No term', W / 2, 120);
  ctx.fillText('conflicts: ' + conflicts, W / 2, 138);
}

function frame(ts) {
  if (ts - lastTs < 600) { state.rafId = requestAnimationFrame(frame); return; }
  lastTs = ts; tickN++;

  // Multi-master: random subset writes simultaneously
  var mlWriters = [];
  for (var i = 0; i < numNodes; i++) {
    if (Math.random() * 100 < writeRate) mlWriters.push(i);
  }
  if (mlWriters.length > 1) mlConflicts++;

  // Raft: leader election, only leader writes
  if (Math.random() < 0.08) { raftTerm++; raftLeader = (raftLeader + 1) % numNodes; }
  var raftWriters = Math.random() * 100 < writeRate ? [raftLeader] : [];

  strip.push(0, mlConflicts);
  strip.push(1, raftConflicts);
  drawNodes(ctxA, cvA, mlWriters, -1, mlConflicts, 0);
  drawNodes(ctxB, cvB, raftWriters, raftLeader, raftConflicts, raftTerm);
  met.update({ tick: tickN, 'ML conflicts': mlConflicts, 'raft conflicts': raftConflicts, 'raft term': raftTerm });
  document.getElementById('status').textContent =
    'ML conflicts: ' + mlConflicts + ' | Raft conflicts: ' + raftConflicts + ' (term ' + raftTerm + ')';

  if (!state.paused) state.rafId = requestAnimationFrame(frame);
}

SimLib.slider('Nodes', 3, 7, 2, 5, function(v) { numNodes = v; reset(); });
SimLib.slider('Write rate %', 10, 80, 10, 40, function(v) { writeRate = v; });
var state = SimLib.pauseResumeReset(frame, reset);
var met = SimLib.metrics();
reset();
state.rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
